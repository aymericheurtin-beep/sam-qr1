<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>QR11 - Bureau Vidal</title>
<style>
html,body{margin:0;height:100%;background:#000;color:#fff;font-family:Courier New,monospace;overflow:hidden;-webkit-user-select:none;user-select:none}
#start,#restart{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:5vmin;padding:4vmin 8vmin;background:#fff;color:#000;border:none;border-radius:10px;cursor:pointer;z-index:200;-webkit-tap-highlight-color:transparent}
#restart{display:none}
#text{position:absolute;left:50%;transform:translateX(-50%);width:92%;text-align:center;font-size:4.6vmin;line-height:1.4;z-index:30;display:none;white-space:pre-line;text-shadow:0 0 6px #000}
#text.center{top:10%}
#text.bottom{bottom:6%;font-size:3.6vmin;background:rgba(0,0,0,.75);padding:1.8vmin 2.5vmin;border-radius:8px;max-width:88%}
#choices{position:absolute;top:32%;left:50%;transform:translateX(-50%);display:none;flex-direction:column;gap:2vmin;width:90%;z-index:35}
.btn{font-size:4vmin;padding:2.8vmin;background:#111;color:#fff;border:1px solid #fff;border-radius:8px;cursor:pointer;text-align:center}
.btn.sel{background:#fff;color:#000}
#image{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);max-width:92vmin;max-height:80vmin;z-index:10;display:none}
#carnetBox{position:absolute;bottom:6%;left:50%;transform:translateX(-50%);width:92%;display:none;flex-direction:column;gap:1.5vmin;z-index:40}
.carnetBtn{font-size:3.6vmin;padding:2vmin;background:#000;border:1px solid #fff;color:#fff;border-radius:6px;cursor:pointer;text-align:center}
.carnetBtn.used{opacity:.4}
#carnetLine{position:absolute;top:12%;left:50%;transform:translateX(-50%);width:90%;background:rgba(0,0,0,.85);padding:2vmin;border-radius:8px;font-size:3.8vmin;text-align:center;display:none;z-index:45}
</style>
</head>
<body>
<button id="start">Touchez pour entrer</button>
<button id="restart">Recommencer</button>

<div id="text"></div>
<div id="choices"></div>
<img id="image" alt="">
<div id="carnetBox">
  <button class="carnetBtn" data-id="LAVELOT">[ LAVELOT S. ]</button>
  <button class="carnetBtn" data-id="MOREL">[ MOREL N. ]</button>
  <button class="carnetBtn" data-id="DUBOIS">[ DUBOIS C. ]</button>
</div>
<div id="carnetLine"></div>

<audio id="aKey" src="bruitkey.mp3" preload="auto" playsinline></audio>
<audio id="aPage" src="bruit_pagephoto.mp3" preload="auto" playsinline></audio>

<script>
const $=id=>document.getElementById(id);
const start=$('start'), restart=$('restart'), text=$('text'), choices=$('choices'), image=$('image'), carnetBox=$('carnetBox'), carnetLine=$('carnetLine');
const aKey=$('aKey'), aPage=$('aPage');

const show=el=>el.style.display='block';
const hide=el=>el.style.display='none';
const flex=el=>el.style.display='flex';
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

function showText(t,hold=2500,pos='center'){
  text.className='';text.classList.add(pos);text.textContent=t;show(text);
  return sleep(hold).then(()=>hide(text));
}
function showTextStay(t,pos='center'){
  text.className='';text.classList.add(pos);text.textContent=t;show(text);
}
function showImage(src){
  return new Promise(res=>{
    image.onload=()=>{show(image);res();};
    image.onerror=()=>{console.warn('Image manquante:',src);show(image);res();};
    image.src=src;
  });
}
function hideImage(){hide(image);image.src='';}

async function play(a){try{await a.play();}catch(e){console.warn('Audio bloqué',e);}}

function askMulti(q,opts){
  return new Promise(res=>{
    showTextStay(q,'center');
    choices.innerHTML='';
    const selected=new Set();
    opts.forEach(o=>{
      const b=document.createElement('button');b.className='btn';b.textContent=o;
      b.onclick=()=>{b.classList.toggle('sel');selected.has(o)?selected.delete(o):selected.add(o);};
      choices.appendChild(b);
    });
    const ok=document.createElement('button');ok.className='btn';ok.textContent='Valider';ok.style.marginTop='2vmin';
    ok.onclick=()=>{hide(text);hide(choices);res([...selected]);};
    choices.appendChild(ok);
    flex(choices);
  });
}
function askSingle(q,opts){
  return new Promise(res=>{
    showTextStay(q,'center');
    choices.innerHTML='';
    opts.forEach(o=>{
      const b=document.createElement('button');b.className='btn';b.textContent=o;
      b.onclick=()=>{hide(text);hide(choices);res(o);};
      choices.appendChild(b);
    });
    flex(choices);
  });
}
async function typeWords(lines,delay=600){
  show(text);text.className='center';text.textContent='';
  for(const line of lines){text.textContent+= (text.textContent?'
':'')+line;await sleep(delay);}
  await sleep(1200);hide(text);
}

let started=false;
async function run(){
  if(started) return;
  started=true;
  try{
    hide(start);hide(restart);
    localStorage.setItem('qr11_done','1');

    await showImage('crochetage_vidal.jpg');
    await sleep(3000);
    showTextStay('Confinement. YouTube.
C'est illégal.
C'est pratique.','bottom');
    await sleep(3500);hide(text);hideImage();

    const repBureau = await askMulti('Un bureau de prof. Un samedi matin. Vide.
Vous imaginez quoi ?',[
      'Ordonné','en bazar','petit','grand','lumineux','sombre','Rien de précis'
    ]);
    localStorage.setItem('qr11_bureau',repBureau.join(', '));

    await showImage('bureau_vidal.jpg');
    showTextStay('Voici un bureau','bottom');
    await sleep(3000);hide(text);hideImage();

    await showImage('bureau_vidal.jpg');
    await sleep(800);
    flex(carnetBox);
    const carnetTexts={
      LAVELOT:'LAVELOT : Moteur exceptionnel. Il ira pas aux France si j'ai mon mot à dire.',
      MOREL:'MOREL : Père absent — mobile émotionnel fort. Tout le monde est gagnant.',
      DUBOIS:'DUBOIS : Court comme un frigo qui aurait oublié ses roulettes.'
    };
    let first=null, opened=0;
    await new Promise(res=>{
      carnetBox.querySelectorAll('.carnetBtn').forEach(btn=>{
        btn.onclick=()=>{
          if(btn.classList.contains('used'))return;
          btn.classList.add('used');
          const id=btn.dataset.id;
          if(!first){first=id;localStorage.setItem('qr11_carnet_first',id);}
          carnetLine.textContent=carnetTexts[id];
          show(carnetLine);
          setTimeout(()=>hide(carnetLine),2500);
          opened++;
          if(opened===3){hide(carnetBox);hideImage();res();}
        };
      });
    });

    await showImage('vidal_jeune.webp');
    await sleep(5000);
    await typeWords(['Vidal. Dix-sept ans.','Dossard 14.','Sélection France compromise.'],600);
    const repVidal = await askSingle('Vous l'aviez imaginé comme ça ?',[
      'Oui, à peu près','Non, rien à voir','Je ne l'avais pas imaginé'
    ]);
    localStorage.setItem('qr11_vidal',repVidal);
    hideImage();

    await showImage('vidal_jeune.webp');
    play(aKey);
    await sleep(1500);
    hideImage();
    await showImage('photo_carnet.webp');
    play(aPage);
    await sleep(4000);
    hideImage();

    await typeWords(['Silence.','Son coupé net.'],700);
    const repFeel = await askSingle('Là, maintenant — vous ressentez quelque chose ?',[
      'La peur','l'excitation','autre chose'
    ]);
    localStorage.setItem('qr11_feel',repFeel);

    const bureauTxt = localStorage.getItem('qr11_bureau')||'';
    const vidalTxt = localStorage.getItem('qr11_vidal')||'';
    const firstCarnet = localStorage.getItem('qr11_carnet_first')||'';
    await showText(`Vous aviez imaginé un bureau ${bureauTxt}.
Il était effrayant de netteté.`,3000,'center');
    await sleep(400);
    await showText(`Vous aviez dit que Vidal ressemblait à ${vidalTxt}.
Sam, lui, a mis du temps à reconnaître les épaules.`,3500,'center');
    await sleep(400);
    await showText(`Vous avez regardé ${firstCarnet} en premier.`,3000,'center');
    await sleep(400);
    await showText('Sam, lui, pense à la mandarine.',3000,'center');

    show(restart);
  }catch(e){
    console.error(e);
    text.textContent='Erreur : '+e.message;show(text);show(restart);
  }
}

start.addEventListener('click',run);
start.addEventListener('touchstart',e=>{e.preventDefault();run();},{passive:false});
restart.addEventListener('click',()=>location.reload());
</script>
</body>
</html>
