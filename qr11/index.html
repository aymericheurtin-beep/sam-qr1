<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>QR14</title>
    <style>
        html, body, div, span, img, video, button { 
            all: unset; 
            display: revert; 
            box-sizing: border-box;
        }
        body > div:not(#text):not(#start):not(#restart) { display: none !important; }
        
        html, body {
            background: #000 !important;
            color: #fff;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
        }
        .btn {
            font-size: 4vmin;
            padding: 3vmin 6vmin;
            background: #fff;
            border: none;
            border-radius: 8px;
            color: #000;
            font-family: Arial, sans-serif;
            cursor: pointer;
            position: relative;
            z-index: 9999;
            -webkit-tap-highlight-color: transparent;
        }
        #start { animation: blink 1.5s infinite; }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        #text {
            position: fixed;
            font-size: 3.8vmin;
            text-align: center;
            padding: 5vmin;
            line-height: 1.7;
            opacity: 0;
            transition: opacity 1s;
            white-space: pre-line;
            max-width: 90vw;
            z-index: 9998;
        }
        #media {
            position: fixed;
            width: 100vmin;
            height: 100vmin;
            object-fit: contain;
            opacity: 0;
            transition: opacity 1.2s;
            z-index: 9997;
            background: #000;
        }
        #restart {
            position: fixed;
            bottom: 10vmin;
            opacity: 0;
            transition: opacity 1s;
        }
        .visible { opacity: 1 !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <button id="start" class="btn">Touchez pour entrer</button>
    <div id="text"></div>
    <img id="media" src="" style="display:none;">
    <button id="restart" class="btn">Recommencer</button>

    <audio id="audioKey" src="bruitkey.mp3" preload="auto" playsinline webkit-playsinline></audio>
    <audio id="audioPage" src="bruit_pagephoto.mp3" preload="auto" playsinline webkit-playsinline></audio>

    <script>
        const start = document.getElementById('start');
        const text = document.getElementById('text');
        const media = document.getElementById('media');
        const restart = document.getElementById('restart');
        const audioKey = document.getElementById('audioKey');
        const audioPage = document.getElementById('audioPage');

        const sleep = ms => new Promise(r => setTimeout(r, ms));
        
        const showImage = (src) => {
            return new Promise((resolve) => {
                media.onload = () => {
                    media.style.display = 'block';
                    media.classList.add('visible');
                    resolve();
                };
                media.onerror = () => {
                    console.error('Image introuvable:', src);
                    resolve();
                };
                media.src = src;
            });
        };

        const hideImage = async () => {
            media.classList.remove('visible');
            await sleep(1200);
            media.src = '';
        };

        async function sequence() {
            start.classList.add('hidden');
            
            try {
                // 1. Crochetage - 4s
                await showImage('crochetage_vidal.png');
                await sleep(4000);
                await hideImage();
                
                // 2. Vidal jeune - 2s seule
                await showImage('vidal_jeune.png');
                await sleep(2000);
                
                // 3. Bruit clés démarre
                audioKey.play();
                
                // 4. Après 1s SEULEMENT : on switch sur phot_carnet + bruit photo
                // Résultat : les 2 sons jouent ensemble presque tout le temps
                await sleep(1000);
                await hideImage();
                await showImage('phot_carnet.png');
                audioPage.play();
                
                // 5. On attend que le plus long des 2 sons finisse
                await Promise.all([
                    new Promise(r => audioKey.onended = r),
                    new Promise(r => audioPage.onended = r)
                ]);
                
                await hideImage();
                
                // 6. Sous le bureau - FIN
                await showImage('souslatable.png');
                await sleep(4000);
                await hideImage();
                
                // 7. Bouton recommencer
                restart.classList.add('visible');
            } catch(e) {
                console.error('Erreur:', e);
                text.textContent = 'Erreur. Rechargez la page.';
                text.classList.add('visible');
                restart.classList.add('visible');
            }
        }

        start.onclick = () => sequence();
        restart.onclick = () => location.reload();
    </script>
</body>
</html>
