<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QR11 - Bureau Vidal</title>
<style>
html,body{margin:0;height:100%;background:#000;color:#fff;font-family:Courier New,monospace;overflow:hidden}
#start,#restart{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:5vmin;padding:4vmin 8vmin;background:#fff;color:#000;border:none;border-radius:10px;cursor:pointer;z-index:100}
#restart{display:none}
#text{position:absolute;left:50%;transform:translateX(-50%);width:92%;text-align:center;font-size:4.6vmin;line-height:1.35;z-index:30;display:none;white-space:pre-line;text-shadow:0 0 6px #000}
#text.center{top:8%}
#text.bottom{bottom:6%;font-size:3.6vmin;background:rgba(0,0,0,.75);padding:1.6vmin 2.2vmin;border-radius:8px;max-width:85%}
#choices{position:absolute;top:26%;left:50%;transform:translateX(-50%);display:none;flex-direction:column;gap:1.6vmin;width:88%;max-height:58vh;overflow-y:auto;padding-bottom:2vmin;z-index:35;-webkit-overflow-scrolling:touch}
.btn{font-size:3.8vmin;padding:2.4vmin;background:#111;color:#fff;border:1px solid #fff;border-radius:8px;cursor:pointer;text-align:center;flex-shrink:0}
.btn.sel{background:#fff;color:#000}
#image{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);max-width:90vmin;max-height:78vmin;z-index:10;display:none}
#carnetBox{position:absolute;bottom:5%;left:50%;transform:translateX(-50%);width:92%;display:none;flex-direction:column;gap:1.2vmin;z-index:40;max-height:40vh;overflow-y:auto}
.carnetBtn{font-size:3.4vmin;padding:1.8vmin;background:#000;border:1px solid #fff;color:#fff;border-radius:6px;cursor:pointer;text-align:center;flex-shrink:0}
.carnetBtn.used{opacity:.4}
#carnetLine{position:absolute;top:12%;left:50%;transform:translateX(-50%);width:90%;background:rgba(0,0,0,.85);padding:2vmin;border-radius:8px;font-size:3.6vmin;text-align:center;display:none;z-index:45}
</style>
</head>
<body>
<button id="start">Touchez pour entrer</button>
<button id="restart">Recommencer</button>

<div id="text"></div>
<div id="choices"></div>
<img id="image" alt="">
<div id="carnetBox">
  <button class="carnetBtn" data-id="LAVELOT">[ LAVELOT S. ]</button>
  <button class="carnetBtn" data-id="MOREL">[ MOREL N. ]</button>
  <button class="carnetBtn" data-id="DUBOIS">[ DUBOIS C. ]</button>
</div>
<div id="carnetLine"></div>

<audio id="aKey" src="bruitkey.mp3" preload="auto"></audio>
<audio id="aPage" src="bruit_pagephoto.mp3" preload="auto"></audio>

<script>
const $ = id => document.getElementById(id);
const start = $('start'), restart = $('restart'), text = $('text'), choices = $('choices'), image = $('image'), carnetBox = $('carnetBox'), carnetLine = $('carnetLine');
const aKey = $('aKey'), aPage = $('aPage');

const show = el => el.style.display = 'block';
const hide = el => el.style.display = 'none';
const flex = el => el.style.display = 'flex';
const sleep = ms => new Promise(r => setTimeout(r, ms));

function showText(t, hold=3000, pos='center'){
  text.className=''; text.classList.add(pos);
  text.textContent=t; show(text);
  return sleep(hold).then(()=>hide(text));
}
function showTextStay(t,pos='center'){
  text.className=''; text.classList.add(pos);
  text.textContent=t; show(text);
}
function showImage(src){
  return new Promise(res=>{
    image.onload=()=>{show(image);res();};
    image.onerror=()=>{show(image);res();};
    image.src=src;
  });
}
function hideImage(){hide(image);image.src='';}
async function play(a){try{await a.play();}catch{}}

function askMulti(q,opts){
  return new Promise(res=>{
    showTextStay(q,'center');
    choices.innerHTML='';
    const sel=new Set();
    opts.forEach(o=>{
      const b=document.createElement('button');b.className='btn';b.textContent=o;
      b.onclick=()=>{b.classList.toggle('sel'); sel.has(o)?sel.delete(o):sel.add(o); };
      choices.appendChild(b);
    });
    const ok=document.createElement('button');ok.className='btn';ok.textContent='Valider';ok.style.marginTop='1vmin';ok.style.background='#fff';ok.style.color='#000';
    ok.onclick=()=>{hide(text);hide(choices);res([...sel]);};
    choices.appendChild(ok);
    flex(choices);
    choices.scrollTop=0;
  });
}
function askSingle(q,opts){
  return new Promise(res=>{
    showTextStay(q,'center');
    choices.innerHTML='';
    opts.forEach(o=>{
      const b=document.createElement('button');b.className='btn';b.textContent=o;
      b.onclick=()=>{hide(text);hide(choices);res(o);};
      choices.appendChild(b);
    });
    flex(choices);
    choices.scrollTop=0;
  });
}
async function typeWords(lines,delay=600){
  show(text);text.className='center';text.textContent='';
  for(const l of lines){text.textContent+=(text.textContent?'\n':'')+l;await sleep(delay);}
  await sleep(1200);hide(text);
}

async function run(){
  hide(start);hide(restart);
  localStorage.setItem('qr11_done','1');

  await showImage('crochetage_vidal.jpg');
  await sleep(3000);
  showTextStay('Confinement. YouTube.\nC\'est illégal.\nC\'est pratique.','bottom');
  await sleep(3500);hide(text);hideImage();

  const repBureau = await askMulti('Un bureau de prof. Un samedi matin. Vide.\nVous imaginez quoi ?',[
    'Ordonné','en bazar','petit','grand','lumineux','sombre','Rien de précis'
  ]);
  localStorage.setItem('qr11_bureau',repBureau.join(', '));

  await showImage('bureau_vidal.jpg');
  await showText('Voici un bureau',3000,'bottom');
  hideImage();

  await showImage('bureau_vidal.jpg');
  await sleep(800);
  flex(carnetBox);
  const carnetTexts={
    LAVELOT:"LAVELOT : Moteur exceptionnel. Il ira pas aux France si j'ai mon mot à dire.",
    MOREL:"MOREL : Père absent — mobile émotionnel fort. Tout le monde est gagnant.",
    DUBOIS:"DUBOIS : Court comme un frigo qui aurait oublié ses roulettes."
  };
  let first=null, opened=0;
  await new Promise(res=>{
    carnetBox.querySelectorAll('.carnetBtn').forEach(btn=>{
      btn.onclick=()=>{
        if(btn.classList.contains('used'))return;
        btn.classList.add('used');
        const id=btn.dataset.id;
        if(!first){first=id;localStorage.setItem('qr11_carnet_first',id);}
        carnetLine.textContent=carnetTexts[id];
        show(carnetLine);
        setTimeout(()=>hide(carnetLine),2500);
        opened++;
        if(opened===3){hide(carnetBox);hideImage();res();}
      };
    });
  });

  await showImage('vidal_jeune.webp');
  await sleep(5000);
  await typeWords(['Vidal. Dix-sept ans.','Dossard 14.','Sélection France compromise.'],600);
  const repVidal = await askSingle('Vous l\'aviez imaginé comme ça ?',['Oui, à peu près','Non, rien à voir','Je ne l\'avais pas imaginé']);
  localStorage.setItem('qr11_vidal',repVidal);
  hideImage();

  await showImage('vidal_jeune.webp');
  play(aKey);
  await sleep(1500);
  hideImage();
  await showImage('photo_carnet.webp');
  play(aPage);
  await sleep(4000);
  hideImage();

  await typeWords(['Silence.','Son coupé net.'],700);
  const repFeel = await askSingle('Là, maintenant — vous ressentez quelque chose ?',['La peur','l\'excitation','autre chose']);
  localStorage.setItem('qr11_feel',repFeel);

  const bureauTxt = localStorage.getItem('qr11_bureau')||'';
  const vidalTxt = localStorage.getItem('qr11_vidal')||'';
  const firstCarnet = localStorage.getItem('qr11_carnet_first')||'';
  await showText(`Vous aviez imaginé un bureau ${bureauTxt}.\nIl était effrayant de netteté.`,3000,'center');
  await sleep(400);
  await showText(`Vous aviez dit que Vidal ressemblait à ${vidalTxt}.\nSam, lui, a mis du temps à reconnaître les épaules.`,3500,'center');
  await sleep(400);
  await showText(`Vous avez regardé ${firstCarnet} en premier.`,3000,'center');
  await sleep(400);
  await showText('Sam, lui, pense à la mandarine.',3000,'center');

  show(restart);
}

start.onclick = run;
restart.onclick = ()=> location.reload();
</script>
</body>
</html>
