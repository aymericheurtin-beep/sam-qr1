<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR6 - VIDAL</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { 
    width: 100%; height: 100%; 
    background: #000; 
    overflow: hidden; 
    font-family: Arial, sans-serif;
  }
  #stage {
    position: relative;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: #000;
  }
  .btn {
    background: #fff;
    color: #000;
    border: none;
    padding: 12px 24px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(255,255,255,0.2);
    -webkit-tap-highlight-color: transparent;
    z-index: 10;
  }
  .btn:active { transform: scale(0.98); }
  
  #restartBtn {
    position: absolute;
    bottom: 8vmin;
    display: none;
    opacity: 0;
    transition: opacity 0.5s;
  }
  
  #oeil {
    position: absolute;
    width: 100vmin; height: 100vmin;
    max-width: 100vw; max-height: 100vh;
    object-fit: contain;
    opacity: 0; transition: opacity 0.3s;
    display: none;
  }
  
  .corner {
    position: absolute; width: 8vmin; height: 8vmin;
    border: 2px solid #00E5FF; opacity: 0;
    transition: opacity 0.2s; display: none;
  }
  .tl { top: 10vmin; left: 10vmin; border-right:0; border-bottom:0; }
  .tr { top: 10vmin; right: 10vmin; border-left:0; border-bottom:0; }
  .bl { bottom: 10vmin; left: 10vmin; border-right:0; border-top:0; }
  .br { bottom: 10vmin; right: 10vmin; border-left:0; border-top:0; }
  
  #irisGlow {
    position: absolute;
    width: 14vmin; height: 14vmin;
    border-radius: 50%;
    background: radial-gradient(circle, #00E5FF 0%, #00B8D4 40%, transparent 70%);
    opacity: 0; pointer-events: none;
    mix-blend-mode: screen;
    left: 50%; top: 45%;
    transform: translate(-50%, -50%);
    display: none;
  }
  .pulse { animation: irisPulse 1.8s ease-out; }
  @keyframes irisPulse { 
    0%{opacity:0; transform:translate(-50%, -50%) scale(0.3)} 
    40%{opacity:0.9; transform:translate(-50%, -50%) scale(1.1)} 
    100%{opacity:0; transform:translate(-50%, -50%) scale(1.6)} 
  }
  
  .flash { animation: flashWhite 0.12s; }
  @keyframes flashWhite { 0%,100%{background:#000} 50%{background:#fff} }
</style>
</head>
<body>
<div id="stage">
  <button id="startBtn" class="btn">Touchez pour commencer</button>
  
  <img id="oeil" src="imageoeil.jpeg" alt="">
  <div id="irisGlow"></div>
  
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  
  <button id="restartBtn" class="btn">Recommencer</button>
</div>

<audio id="tictac" src="tictac.mp3" preload="auto"></audio>
<audio id="scan" src="scanner.mp3" preload="auto"></audio>
<audio id="voix" src="audio_vidal.mp3" preload="auto"></audio>

<script>
const startBtn = document.getElementById('startBtn');
const restartBtn = document.getElementById('restartBtn');
const oeil = document.getElementById('oeil');
const corners = document.querySelectorAll('.corner');
const irisGlow = document.getElementById('irisGlow');
const tictac = document.getElementById('tictac');
const scan = document.getElementById('scan');
const voix = document.getElementById('voix');

let started = false;

startBtn.addEventListener('click', startExperience);
restartBtn.addEventListener('click', resetAndStart);

function startExperience() {
  if (started) return;
  started = true;
  startBtn.style.display = 'none';
  restartBtn.style.display = 'none';
  restartBtn.style.opacity = '0';
  oeil.style.display = 'block';
  irisGlow.style.display = 'block';
  corners.forEach(c => c.style.display = 'block');
  runSequence();
}

function resetAndStart() {
  // Reset visuels
  oeil.style.opacity = '0';
  irisGlow.classList.remove('pulse');
  corners.forEach(c => c.style.opacity = '0');
  restartBtn.style.opacity = '0';
  setTimeout(() => restartBtn.style.display = 'none', 500);
  
  // Reset audio
  tictac.currentTime = 0;
  scan.currentTime = 0;
  voix.currentTime = 0;
  
  // Relance
  setTimeout(startExperience, 300);
}

async function playSafe(audio) {
  try { await audio.play(); } 
  catch(e) { console.log('Audio error:', audio.src, e); }
}

async function runSequence() {
  await playSafe(tictac);
  await sleep(2000);
  
  document.body.classList.add('flash');
  await sleep(120);
  document.body.classList.remove('flash');
  await playSafe(scan);
  await sleep(880);
  
  oeil.style.opacity = '1';
  corners.forEach(c => c.style.opacity = '1');
  await sleep(500);
  
  await playSafe(voix);
  setTimeout(() => irisGlow.classList.add('pulse'), 4500);
  
  voix.onended = () => {
    corners.forEach(c => c.style.opacity = '0');
    // Affiche le bouton Recommencer
    setTimeout(() => {
      restartBtn.style.display = 'block';
      setTimeout(() => restartBtn.style.opacity = '1', 50);
      started = false;
    }, 800);
  };
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}
</script>
</body>
</html>
