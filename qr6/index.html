<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QR6 - VIDAL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:Arial,sans-serif;color:#fff}
#stage{position:relative;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:#000}
.btn{background:#fff;color:#000;border:none;padding:14px 28px;font-size:18px;border-radius:8px;cursor:pointer;z-index:10}
#startBtn{position:absolute}
#restartBtn{position:absolute;bottom:8vmin;display:none;opacity:0;transition:opacity 1.5s}
#texte{position:absolute;text-align:center;font-size:5vmin;line-height:1.6;max-width:85vw;opacity:0;transition:opacity 1s;font-family:'Courier New',monospace}
.screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;background:#000;z-index:30}
.screen.active{display:flex}
.screen p{font-size:22px;margin-bottom:20px}
.choice{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
#recall{font-size:18px;color:#aaa;margin-top:20px}
</style>
</head>
<body>
<div id="stage">
  <button id="startBtn" class="btn">Touchez pour commencer</button>
  <div id="texte"></div>
  <button id="restartBtn" class="btn">Recommencer</button>
</div>

<div id="pre" class="screen">
  <p>Vidal, vous l’aviez imaginé comment?</p>
  <div class="choice">
    <button class="btn choiceBtn" data-val="dur">Quelqu’un de dur</button>
    <button class="btn choiceBtn" data-val="blessé">Quelqu’un de blessé</button>
    <button class="btn choiceBtn" data-val="autre">Autre</button>
  </div>
</div>

<audio id="voir" src="voir_drole.mp3" preload="auto"></audio>

<script>
const startBtn=document.getElementById('startBtn');
const restartBtn=document.getElementById('restartBtn');
const texte=document.getElementById('texte');
const pre=document.getElementById('pre');
const voir=document.getElementById('voir');

let started=false;
let choix='';

let t=parseInt(localStorage.getItem('scans_total')||0)+1;
localStorage.setItem('scans_total',t);

startBtn.onclick=()=>{
  let u=parseInt(localStorage.getItem('scans_used')||0)+1;
  localStorage.setItem('scans_used',u);
  startBtn.style.display='none';
  pre.classList.add('active');
};

document.querySelectorAll('.choiceBtn').forEach(b=>{
  b.onclick=()=>{
    choix=b.dataset.val;
    pre.classList.remove('active');
    startExperience();
  };
});

restartBtn.onclick=()=>location.reload();

async function startExperience(){
  if(started) return;
  started=true;
  runSequence();
}

async function playSafe(a){try{a.currentTime=0;await a.play()}catch(e){}}
async function fadeText(txt,hold=2000){
  texte.innerHTML=txt;
  texte.style.opacity='1';
  await sleep(hold);
  texte.style.opacity='0';
  await sleep(1000);
}

async function runSequence(){
  await fadeText('Il entre.',1500);
  await fadeText('Pas de cris.',1500);
  await fadeText('Juste un regard.',1500);
  await playSafe(voir);
  await sleep(2500);
  await fadeText('Vidal ne sourit pas.',2000);
  await fadeText('Il écoute.',2000);
  texte.innerHTML=`Vous aviez dit "${choix}".<br>Et maintenant?<br><span id="recall"></span>`;
  texte.style.opacity='1';
  await sleep(3000);
  restartBtn.style.display='block';
  setTimeout(()=>restartBtn.style.opacity='1',50);
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
</script>
</body>
</html>
