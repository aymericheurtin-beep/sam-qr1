<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QR0 - Mode d'emploi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;width:100%;height:100vh;overflow:hidden;font-family:system-ui;display:flex;align-items:center;justify-content:center;text-align:center}
#btn{background:#fff;color:#000;border:none;padding:20px 40px;font-size:20px;border-radius:8px;cursor:pointer}
#msg{display:none;font-size:22px;line-height:1.4;padding:40px;max-width:600px}
#restart{background:#fff;color:#000;border:none;padding:15px 30px;font-size:18px;border-radius:8px;cursor:pointer;margin-top:30px}
</style>
</head>
<body>
<button id="btn">Touchez pour commencer</button>
<div id="msg">Fermez les yeux 5 secondes avant chaque scan. Imaginez d'abord. Scannez ensuite si besoin.<br><button id="restart">Recommencer</button></div>

<audio id="intro" src="./intro.mp3" preload="auto"></audio>

<script>
const btn=document.getElementById('btn');
const msg=document.getElementById('msg');
const intro=document.getElementById('intro');
const restart=document.getElementById('restart');

// Initialisation autonomisation
localStorage.setItem('scans_total',0);
localStorage.setItem('scans_used',0);

btn.onclick=()=>{
  btn.style.display='none';
  intro.play().catch(()=>alert('Activez le son'));
}

intro.onended=()=>{
  msg.style.display='block';
}

restart.onclick=()=>location.reload();
</script>
</body>
</html>
