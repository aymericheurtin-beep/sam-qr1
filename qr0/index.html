<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QR0 - Mode d'emploi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;width:100%;height:100vh;overflow:hidden;font-family:system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;display:flex;align-items:center;justify-content:center;text-align:center}
#btn{background:#fff;color:#000;border:none;padding:20px 40px;font-size:20px;border-radius:8px;cursor:pointer}
#msg{display:none;font-size:22px;line-height:1.4;padding:40px;max-width:650px}
#restart{background:#fff;color:#000;border:none;padding:15px 30px;font-size:18px;border-radius:8px;cursor:pointer;margin-top:30px}
.sub{opacity:0.8;font-size:18px;display:block;margin-top:20px;line-height:1.3}
</style>
<style>
/* === UNIFICATION TYPO === */
html,body,button,input,select,textarea {
  font-family:system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
}
p, #text, .screen p, #question, #msg {
  font-size:clamp(20px,4.5vmin,28px) !important;
  line-height:1.45 !important;
}
button, .btn, .choiceBtn, .choice, .carnetBtn {
  font-size:clamp(18px,4vmin,24px) !important;
  font-family:system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
}
#startBtn, #start, #btn, #restartBtn, #restart {
  font-size:clamp(20px,5vmin,26px) !important;
}
small, .sub, #recall, #hint, #carnetLine {
  font-size:clamp(16px,3.2vmin,20px) !important;
}
</style>
</head>
<body>
<button id="btn">Touchez pour commencer</button>
<div id="msg">
  Fermez les yeux 5 secondes avant chaque scan. Imaginez d'abord. Scannez ensuite si besoin.
  <span class="sub">Chaque QR proposé augmente le compteur. Chaque QR que vous ouvrez est compté. À la fin du livre vous verrez combien de fois vous avez choisi d'imaginer seul.</span>
  <br><button id="restart">Recommencer</button>
</div>

<audio id="intro" src="./intro.mp3" preload="auto"></audio>

<script>
const btn=document.getElementById('btn');
const msg=document.getElementById('msg');
const intro=document.getElementById('intro');
const restart=document.getElementById('restart');

localStorage.setItem('scans_total',0);
localStorage.setItem('scans_used',0);

btn.onclick=()=>{
  btn.style.display='none';
  intro.play().catch(()=>alert('Activez le son'));
}

intro.onended=()=>{
  msg.style.display='block';
}

restart.onclick=()=>location.reload();
</script>
</body>
</html>
