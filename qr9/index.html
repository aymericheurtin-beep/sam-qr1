<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QR9 - Sam</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:Arial,sans-serif;overflow:hidden;width:100vw;height:100vh;display:flex;justify-content:center;align-items:center;position:relative}
.btn{font-size:4vmin;padding:3vmin 6vmin;background:#fff;border:none;border-radius:8px;color:#000;cursor:pointer;z-index:9999}
#start{animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.6}}
#text{position:absolute;font-size:5.5vmin;text-align:center;padding:5vmin;line-height:1.4;opacity:0;transition:opacity .8s;white-space:pre-line;font-family:'Courier New',monospace;z-index:9998}
#text.bottom{bottom:8vmin;top:auto;font-size:4.5vmin;padding:3vmin}
#image{position:absolute;width:100vmin;height:100vmin;object-fit:contain;opacity:0;transition:opacity 1.5s;z-index:9997}
#restart{position:absolute;bottom:10vmin;opacity:0;transition:opacity 1s}
.visible{opacity:1!important}
.hidden{display:none!important}
</style>
</head>
<body>
<button id="start" class="btn">Touchez pour commencer</button>
<div id="text"></div>
<img id="image" src="mains.webp" alt="Mains d'Inès, baskets trouées de Dubois en arrière-plan">
<button id="restart" class="btn">Recommencer</button>

<audio id="audio1" src="audio_vidal.mp3" preload="auto"></audio>
<audio id="audio2" src="cadenas_troisfois.mp3" preload="auto"></audio>
<audio id="audio3" src="audio_inesnoe.mp3" preload="auto"></audio>

<script>
const start=document.getElementById('start');
const text=document.getElementById('text');
const image=document.getElementById('image');
const restart=document.getElementById('restart');
const audio1=document.getElementById('audio1');
const audio2=document.getElementById('audio2');
const audio3=document.getElementById('audio3');

const sleep=ms=>new Promise(r=>setTimeout(r,ms));

async function show(txt,hold=2000,pos='center'){
  text.className='';
  if(pos==='bottom') text.classList.add('bottom');
  text.textContent=txt;
  text.classList.add('visible');
  await sleep(hold);
  text.classList.remove('visible');
  await sleep(400);
}

async function sequence(){
  start.classList.add('hidden');

  let used=parseInt(localStorage.getItem('scans_used')||0)+1;
  localStorage.setItem('scans_used',used);
  localStorage.setItem('qr9_done','1');

  audio1.play().catch(()=>{});
  await sleep(5000);
  await sleep(1000);

  await show('Fermez les yeux.\nVestiaires. Métal froid.\nCorps mouillé et frigorifié.',4000);

  text.className='bottom visible';
  text.textContent='Il vérifie. Une fois. Deux fois. Trois fois.';
  audio2.play().catch(()=>{});
  await sleep(4000);
  text.classList.remove('visible');

  image.classList.add('visible');
  await sleep(6000);
  image.classList.remove('visible');
  await sleep(800);

  audio3.play().catch(()=>{});
  await sleep(5000);

  // pause 1.8s avant la question
  await sleep(1800);

  await show('Avez-vous imaginé la scène différemment ?',4500);

  restart.classList.add('visible');
}

start.onclick=()=>sequence();
restart.onclick=()=>location.reload();
</script>
</body>
</html>
