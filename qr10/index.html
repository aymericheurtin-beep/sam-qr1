<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QR10 - Sam</title>
<style>
html,body{margin:0;height:100%;background:#000;color:#fff;font-family:system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;overflow:hidden}
#start{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(20px,5vmin,26px);padding:20px 40px;background:#fff;color:#000;border:none;border-radius:10px;cursor:pointer;z-index:100}
#restart{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);font-size:clamp(20px,5vmin,26px);padding:15px 30px;background:#fff;color:#000;border:none;border-radius:10px;cursor:pointer;z-index:100;display:none}
#text{position:absolute;left:50%;transform:translateX(-50%);width:92%;text-align:center;font-size:clamp(20px,4.5vmin,28px);line-height:1.45;z-index:30;display:none;white-space:pre-line;text-shadow:0 0 6px #000}
#text.center{top:8%}
#text.bottom{bottom:6%;font-size:clamp(18px,3.8vmin,24px);background:rgba(0,0,0,.75);padding:1.8vmin 2.5vmin;border-radius:8px;max-width:85%}
#choices{position:absolute;top:28%;left:50%;transform:translateX(-50%);display:none;flex-direction:column;gap:2.2vmin;width:88%;z-index:30}
.btn{font-size:clamp(18px,4vmin,24px);padding:20px 28px;background:#111;color:#fff;border:1px solid #fff;border-radius:8px;cursor:pointer;text-align:center;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}
.btn.validate{background:#fff;color:#000;margin-top:2vmin}
.choice{display:flex;align-items:center;gap:2vmin;background:#111;border:1px solid #fff;border-radius:8px;padding:20px 28px;font-size:clamp(18px,4vmin,24px);cursor:pointer}
.choice input{width:4vmin;height:4vmin}
#image,#video{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);max-width:96vw;max-height:85vh;z-index:10;display:none}
#count{position:absolute;bottom:5vmin;right:6vmin;font-size:8vmin;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;z-index:30;display:none;text-shadow:0 0 8px #000}
</style>
</head>
<body>
<button id="start">Touchez pour entrer</button>
<button id="restart">Recommencer</button>

<div id="text"></div>
<div id="choices"></div>
<img id="image" alt="">
<video id="video" playsinline muted></video>
<div id="count"></div>

<audio id="a1" src="couloirhopital2.mp3" preload="auto"></audio>
<audio id="a2" src="Remy.mp3" preload="auto"></audio>
<audio id="a3" src="vibreur.mp3" preload="auto"></audio>

<script>
const $ = id => document.getElementById(id);
const start = $('start'), restart = $('restart'), text = $('text'), choices = $('choices'), image = $('image'), video = $('video'), count = $('count');
const a1 = $('a1'), a2 = $('a2'), a3 = $('a3');

const show = el => el.style.display = 'block';
const hide = el => el.style.display = 'none';
const flex = el => el.style.display = 'flex';
const sleep = ms => new Promise(r => setTimeout(r, ms));

function showText(t, hold=3000, pos='center'){
  text.className = ''; text.classList.add(pos);
  text.textContent = t; show(text);
  return sleep(hold).then(()=>hide(text));
}

function askSingle(q, opts){
  return new Promise(async res=>{
    text.className='center'; text.textContent=q; show(text);
    await sleep(500);
    choices.innerHTML='';
    opts.forEach(o=>{
      const b=document.createElement('button'); b.className='btn'; b.textContent=o;
      b.onclick=()=>{ hide(text); hide(choices); res(o); };
      choices.appendChild(b);
    });
    flex(choices);
  });
}

function askMulti(q, opts){
  return new Promise(async res=>{
    text.className='center'; text.textContent=q; show(text);
    await sleep(500);
    choices.innerHTML='';
    opts.forEach(o=>{
      const lab=document.createElement('label'); lab.className='choice';
      const cb=document.createElement('input'); cb.type='checkbox'; cb.value=o;
      lab.appendChild(cb); lab.append(o); choices.appendChild(lab);
    });
    const v=document.createElement('button'); v.className='btn validate'; v.textContent='Valider';
    v.onclick=()=>{ const sel=[...choices.querySelectorAll('input:checked')].map(i=>i.value); hide(text); hide(choices); res(sel); };
    choices.appendChild(v);
    flex(choices);
  });
}

async function play(a){ try{ await a.play(); }catch{} }

async function run(){
  hide(start); hide(restart);

  let used = parseInt(localStorage.getItem('scans_used')||'0')+1;
  localStorage.setItem('scans_used', used);
  localStorage.setItem('qr10_done','1');

  await play(a1); await sleep(8000); a1.pause(); a1.currentTime=0;

  const repCouloir = await askSingle("Qu'est-ce que vous avez vu dans votre tête ?", ["Un couloir blanc","Quelque chose de plus sombre","Rien de précis"]);
  localStorage.setItem('qr10_couloir', repCouloir);

  image.src='portechambre.webp'; show(image);
  await showText('Chambre 214. Inès et Sam entrent.',2500,'bottom');
  hide(image);
  await showText('Vous avez 10 secondes pour imaginer ce qu’Inès et Sam vont voir et découvrir dans cette chambre',6500,'center');
  show(image); show(count);
  for(let i=10;i>=1;i--){ count.textContent=i; await sleep(1000); }
  hide(count); hide(image);

  await play(a2); await sleep(8000); a2.pause(); a2.currentTime=0;

  video.src='montre_poche.mp4'; show(video);
  try{ await video.play(); }catch{}
  await sleep(4000); video.pause(); hide(video);

  image.src='winamax.webp'; show(image);
  text.className='bottom'; text.textContent='Message lu par Sam et Inès'; show(text);
  await play(a3); await sleep(3500);
  hide(image); hide(text); a3.pause(); a3.currentTime=0;

  await sleep(800);

  image.src='ittversement.webp'; show(image);
  text.className='bottom'; text.textContent='Message lu uniquement par Inès'; show(text);
  await sleep(4000);
  hide(image); hide(text);

  const vu = await askMulti('Durant le décompte des 10 secondes, vous aviez vu :', [
    'La montre qu’Inès emporte',
    'Le sweat que Rémy montre',
    'Les messages du téléphone',
    'Autre chose'
  ]);
  localStorage.setItem('qr10_vu_decompte', JSON.stringify(vu));

  show(restart);
}

start.onclick = run;
restart.onclick = ()=> location.reload();
</script>
</body>
</html>
