<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QR10 - Sam</title>
<style>
html,body{margin:0;height:100%;background:#000;color:#fff;font-family:Courier New,monospace;display:flex;align-items:center;justify-content:center}
#start{font-size:5vmin;padding:4vmin 8vmin;background:#fff;color:#000;border:none;border-radius:8px;cursor:pointer}
#text{position:absolute;top:15%;left:50%;transform:translateX(-50%);font-size:5vmin;text-align:center;width:90%;display:none;white-space:pre-line}
#text.bottom{top:auto;bottom:10%;font-size:4vmin}
#choices{position:absolute;top:55%;left:50%;transform:translateX(-50%);display:none;flex-direction:column;gap:2vmin;width:80%}
.btn{font-size:4vmin;padding:3vmin;background:#111;color:#fff;border:1px solid #fff;border-radius:8px;cursor:pointer;text-align:center}
.btn.validate{background:#fff;color:#000;margin-top:2vmin}
.choice{display:flex;align-items:center;gap:2vmin;background:#111;border:1px solid #fff;border-radius:8px;padding:2.5vmin;font-size:4vmin}
.choice input{width:4vmin;height:4vmin}
#image,#video{position:absolute;max-width:90vmin;max-height:90vmin;display:none}
#count{position:absolute;bottom:5vmin;right:5vmin;font-size:7vmin;font-family:monospace;display:none}
#log{position:absolute;top:0;left:0;font-size:2.5vmin;color:#f88;padding:1vmin;max-width:60%}
</style>
</head>
<body>
<button id="start">Touchez pour entrer</button>
<div id="text"></div>
<div id="choices"></div>
<img id="image">
<video id="video" playsinline muted></video>
<div id="count"></div>
<div id="log"></div>

<audio id="a1" src="couloirhopital2.mp3" preload="auto"></audio>
<audio id="a2" src="Remy.mp3" preload="auto"></audio>
<audio id="a3" src="vibreur.mp3" preload="auto"></audio>

<script>
const $ = id => document.getElementById(id);
const start = $('start'), text = $('text'), choices = $('choices'), image = $('image'), video = $('video'), count = $('count'), log = $('log');
const a1 = $('a1'), a2 = $('a2'), a3 = $('a3');

const slog = m => { log.textContent += m + '\n'; console.log(m); };
const show = el => el.style.display = 'block';
const hide = el => el.style.display = 'none';
const sleep = ms => new Promise(r => setTimeout(r, ms));

function showText(t, hold=2000, pos=''){
  text.className = ''; if(pos) text.classList.add(pos);
  text.textContent = t; show(text);
  return sleep(hold).then(()=>hide(text));
}

function askSingle(q, opts){
  return new Promise(async res=>{
    text.textContent = q; show(text);
    await sleep(400);
    choices.innerHTML = '';
    opts.forEach(o=>{
      const b = document.createElement('button'); b.className='btn'; b.textContent=o;
      b.onclick = ()=>{ hide(text); hide(choices); res(o); };
      choices.appendChild(b);
    });
    choices.style.display='flex';
  });
}

function askMulti(q, opts){
  return new Promise(async res=>{
    text.textContent = q; show(text);
    await sleep(400);
    choices.innerHTML = '';
    opts.forEach(o=>{
      const lab = document.createElement('label'); lab.className='choice';
      const cb = document.createElement('input'); cb.type='checkbox'; cb.value=o;
      lab.appendChild(cb); lab.append(o); choices.appendChild(lab);
    });
    const v = document.createElement('button'); v.className='btn validate'; v.textContent='Valider';
    v.onclick = ()=>{ const sel=[...choices.querySelectorAll('input:checked')].map(i=>i.value); hide(text); hide(choices); res(sel); };
    choices.appendChild(v);
    choices.style.display='flex';
  });
}

async function playAudio(a, name){
  try{ await a.play(); slog('PLAY '+name); }catch(e){ slog('ERR AUDIO '+name+' '+e.message); }
}

start.onclick = async ()=>{
  hide(start);
  try{
    // Autonomisation
    let used = parseInt(localStorage.getItem('scans_used')||'0')+1;
    localStorage.setItem('scans_used', used);
    localStorage.setItem('qr10_done','1');

    // Phase 1 : son seul 8s
    await playAudio(a1,'couloir'); await sleep(8000); a1.pause();

    // Phase 2 : métacognition
    const rep = await askSingle("T'as imaginé quoi ?", ["Un couloir blanc","Quelque chose de plus sombre","Rien de précis"]);
    localStorage.setItem('qr10_couloir', rep);

    // Phase 3 : porte + imagination 10s
    image.src = 'portechambre.webp'; image.onload = ()=>slog('IMG portechambre OK'); image.onerror = ()=>slog('ERR IMG portechambre'); show(image);
    await showText('Chambre 214. Inès et Sam entrent.',2000,'bottom');
    await showText('Alors, comment vous, vous avez imaginé la scène ?',3000);
    await showText('Vous avez 10 secondes pour imaginer ce qu’Inès et Sam vont voir et découvrir dans cette chambre',4000);
    show(count);
    for(let i=10;i>=1;i--){ count.textContent=i; await sleep(1000); }
    hide(count); hide(image);

    // Phase 4 : multi-choix
    const retenu = await askMulti('Vous avez retenu quoi dans cette pièce ?', ['La montre','Le téléphone','Rémy dans son lit','Autre']);
    localStorage.setItem('qr10_retenu', JSON.stringify(retenu));

    // Phase 5 : Rémy
    await playAudio(a2,'Remy'); await sleep(8000); a2.pause();

    // Phase 6 : vidéo montre
    video.src = 'montre_poche.mp4'; video.onloadeddata = ()=>slog('VIDEO OK'); show(video);
    try{ await video.play(); }catch(e){ slog('ERR VIDEO '+e.message); }
    await sleep(4000); video.pause(); hide(video);

    // Phase 6b : winamax + vibreur
    image.src = 'winamax.webp'; show(image);
    text.textContent = 'Le téléphone vibre.\nInès et Sam le voient.'; text.className='bottom'; show(text);
    await playAudio(a3,'vibreur'); await sleep(3000);
    hide(image); hide(text);

    // Phase 6c : virement
    image.src = 'ittversement.webp'; show(image);
    text.textContent = 'Le virement s’affiche.\nSeule Inès le voit.'; text.className='bottom'; show(text);
    await sleep(4000);
    hide(image); hide(text);

    slog('FIN OK');
  }catch(e){
    slog('CRASH '+e.message);
  }
};
</script>
</body>
</html>
