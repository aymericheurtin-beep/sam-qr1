<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QR12 TEST</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh}
#start{font-size:24px;padding:20px 40px}
#log{position:absolute;top:20px;left:20px;font-size:16px;white-space:pre-wrap}
</style>
</head>
<body>
<button id="start" onclick="run()">Touchez pour commencer</button>
<div id="log"></div>
<script>
function log(m){ document.getElementById('log').textContent += m + "\n"; }
async function run(){
  log('run() appelé');
  document.getElementById('start').style.display='none';
  log('OK démarrage');
  await new Promise(r=>setTimeout(r,1000));
  const choix = prompt('Personnage ? Vidal/Noé/Rémy/Chloé/Colin/Sam/Inès');
  log('Choix : '+choix);
  alert('Tu as choisi : '+choix+'\nSi tu vois ça, le JS tourne.');
}
window.onerror = (msg,src,line)=>{ log('ERREUR: '+msg+' @'+line); };
log('Page chargée');
</script>
</body>
</html>
