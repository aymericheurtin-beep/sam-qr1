<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QR12</title>
<style>
html,body{margin:0;height:100%;background:#000;color:#fff;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;overflow:hidden}
#start{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(20px,5vmin,26px);padding:20px 40px;background:#fff;color:#000;border:none;border-radius:10px;cursor:pointer;z-index:100}
#restart{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);font-size:clamp(20px,5vmin,26px);padding:15px 30px;background:#fff;color:#000;border:none;border-radius:10px;cursor:pointer;z-index:100;display:none}
#text{position:absolute;left:50%;transform:translateX(-50%);width:92%;text-align:center;font-size:clamp(20px,4.5vmin,28px);line-height:1.45;z-index:30;display:none;white-space:pre-line;text-shadow:0 0 6px #000}
#text.center{top:8%}
#text.bottom{bottom:6%;font-size:clamp(18px,3.8vmin,24px);background:rgba(0,0,0,.75);padding:1.8vmin 2.5vmin;border-radius:8px;max-width:85%}
#choices{position:absolute;bottom:8%;left:50%;transform:translateX(-50%);display:none;flex-direction:column;gap:2vmin;width:88%;max-height:45vh;overflow-y:auto;z-index:80}
.btn{font-size:clamp(18px,4vmin,24px);padding:20px 28px;background:rgba(17,17,17,.92);color:#fff;border:1px solid #fff;border-radius:8px;cursor:pointer;text-align:center}
.btn.sel{background:#fff;color:#000}
#image{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);max-width:96vw;max-height:85vh;z-index:10;display:none;opacity:0;transition:opacity .8s}
#inesCropWrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:45vmin;height:60vmin;overflow:hidden;display:none;z-index:15;border:2px solid #fff;border-radius:8px;background:#000}
#inesCropWrap img{position:absolute;width:300%;height:200%;top:0;left:0}
#stats{position:absolute;top:5vmin;right:6vmin;font-size:clamp(16px,4vmin,22px);z-index:30;display:none;text-shadow:0 0 8px #000;text-align:right;line-height:1.4;background:rgba(0,0,0,.6);padding:1.5vmin 2vmin;border-radius:8px}
</style>
</head>
<body>
<button id="start" onclick="run()">Touchez pour commencer</button>
<button id="restart" onclick="location.reload()">Recommencer</button>
<div id="text"></div>
<div id="choices"></div>
<img id="image" alt="">
<div id="inesCropWrap"><img id="inesCropImg" src="ines_5_choix.jpg" alt=""></div>
<div id="stats"></div>
<audio id="narrateur" src="narrateur.mp3" preload="auto" playsinline></audio>

<script>
const $=id=>document.getElementById(id);
const start=$('start'), restart=$('restart'), text=$('text'), choices=$('choices'), image=$('image'), stats=$('stats'), narrateur=$('narrateur');
const cropWrap=$('inesCropWrap'), cropImg=$('inesCropImg');

function show(el){ el.style.display='block'; }
function hide(el){ el.style.display='none'; }
function flex(el){ el.style.display='flex'; }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

function showText(t,pos='center'){ text.className=''; text.classList.add(pos); text.textContent=t; show(text); }
function hideText(){ hide(text); }

function showImage(src){
  return new Promise(res=>{
    image.onload=()=>{ show(image); requestAnimationFrame(()=>image.style.opacity='1'); res(); };
    image.onerror=()=>{ show(image); image.style.opacity='1'; res(); };
    image.style.opacity='0';
    image.src=src;
  });
}
function hideImage(){ image.style.opacity='0'; setTimeout(()=>{ hide(image); image.src=''; },400); }

async function play(a){ try{ await a.play(); }catch{} }

function askSingle(q,opts){
  return new Promise(res=>{
    showText(q,'center');
    choices.innerHTML='';
    opts.forEach(o=>{
      const b=document.createElement('button'); b.className='btn'; b.textContent=o;
      b.onclick=()=>{ hideText(); hide(choices); res(o); };
      choices.appendChild(b);
    });
    flex(choices);
  });
}
function askMulti(q,opts){
  return new Promise(res=>{
    showText(q,'center');
    choices.innerHTML='';
    const sel=new Set();
    opts.forEach(o=>{
      const b=document.createElement('button'); b.className='btn'; b.textContent=o;
      b.onclick=()=>{ b.classList.toggle('sel'); sel.has(o)?sel.delete(o):sel.add(o); };
      choices.appendChild(b);
    });
    const ok=document.createElement('button'); ok.className='btn'; ok.textContent='Valider'; ok.style.background='#fff'; ok.style.color='#000';
    ok.onclick=()=>{ hideText(); hide(choices); res([...sel]); };
    choices.appendChild(ok);
    flex(choices);
  });
}

const descriptions={
 'Vidal':"Bras croisés. La montre neuve. Il attend que ça finisse.",
 'Noé':"Regard sur ses chaussures. La posture des mauvais jours.",
 'Rémy':"Bras bandé de l’épaule aux doigts. Il aurait préféré rester à l’hôpital.",
 'Chloé':"Elle arrive en dernier. Sa démarche quand elle est stressée.",
 'Colin':"Mains dans les poches. Il regarde personne en particulier.",
 'Sam':"Assis au centre. Il regarde Inès.",
 'Inès':"Debout. Elle a demandé à être debout."
};
function normalize(s){ return (s||'').toString().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').trim(); }
function addUsed(id){ const set=new Set(JSON.parse(localStorage.getItem('qr_used_set')||'[]')); set.add(id); localStorage.setItem('qr_used_set',JSON.stringify([...set])); return set.size; }

async function showInesZoom(){
  const choice=parseInt(localStorage.getItem('qr4_ines_choice')||'0',10);
  if(choice>=1 && choice<=5){
    const col=(choice-1)%3, row=Math.floor((choice-1)/3);
    cropImg.style.left=`-${col*100}%`; cropImg.style.top=`-${row*100}%`;
    show(cropWrap);
    showText("c'était ton Inès",'bottom');
    await sleep(4000);
    hideText(); hide(cropWrap);
    return;
  }
  const src=localStorage.getItem('qr4_ines');
  if(src){ await showImage(src); await sleep(4000); hideImage(); }
}

async function run(){
  hide(start); hide(restart); hide(stats);
  const used=addUsed('qr12');

  await play(narrateur);
  await sleep(8000);
  try{ narrateur.pause(); narrateur.currentTime=0; }catch{}

  await askMulti('Comment imaginez-vous cette pièce ?', ['Petite','Grande','Lumineuse','Sombre','Ordonnée','En bazar']);

  await showImage('touslessuspects.jpg');
  await sleep(8000);
  hideImage();

  const charChoice=await askSingle('Appuyez sur le personnage qui vous intéresse le plus.', ['Vidal','Noé','Rémy','Chloé','Colin','Sam','Inès']);

  if(charChoice==='Inès'){ await showInesZoom(); }

  if(charChoice==='Vidal'){
    const vidalMatch = localStorage.getItem('qr11_vidal_match') || '';
    if(normalize(vidalMatch).includes('oui')){
      await showImage('vidal_jeune - Copie.webp');
      showText("vous l'aviez imaginé comme ça jeune",'bottom');
      await sleep(4000);
      hideText(); hideImage();
    }
  }

  let txt=descriptions[charChoice]||'';
  const firstCarnet = (localStorage.getItem('qr11_carnet_first') || localStorage.getItem('qr11_first_carnet') || '').toUpperCase();
  const charNorm = normalize(charChoice);
  if(firstCarnet==='LAVELOT' && charNorm==='sam'){
    txt += "\n\nDécidément ce personnage vous intrigue, vous l'aviez choisi aussi en premier dans le carnet de M. Vidal";
  } else if(firstCarnet==='MOREL' && charNorm==='noe'){
    txt += "\n\nDécidément ce personnage vous intrigue, vous l'aviez choisi aussi en premier dans le carnet de M. Vidal";
  } else if(firstCarnet==='DUBOIS' && charNorm==='chloe'){
    txt += "\n\nDécidément ce personnage vous intrigue, vous l'aviez choisi aussi en premier dans le carnet de M. Vidal";
  }

  showText(txt,'center');
  await sleep(6000);
  hideText();

  showText("Dans quelques secondes vous allez lire la suite du roman.\nChaque personnage dans cette pièce a une raison d’être là.\nVous aussi vous savez des choses sur eux.\nUtilisez-les.",'center');
  await sleep(11000);
  hideText();

  stats.innerHTML=`Scans proposés : 12<br>Scans utilisés : ${used}`;
  show(stats);
  show(restart);
}
window.run = run;
</script>
</body>
</html>
