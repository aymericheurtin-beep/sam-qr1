<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>QR12</title>
<style>
html,body{margin:0;height:100%;background:#000;color:#fff;font-family:'Courier New',monospace;overflow:hidden}
#start{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:5vmin;padding:4vmin 8vmin;background:#fff;color:#000;border:none;border-radius:10px;cursor:pointer;z-index:100}
#restart{position:absolute;bottom:6%;left:50%;transform:translateX(-50%);font-size:4.5vmin;padding:3vmin 7vmin;background:#fff;color:#000;border:none;border-radius:10px;cursor:pointer;z-index:100;display:none}
#text{position:absolute;left:50%;transform:translateX(-50%);width:92%;text-align:center;font-size:4.6vmin;line-height:1.4;z-index:30;display:none;white-space:pre-line;text-shadow:0 0 6px #000}
#text.center{top:12%}
#choices{position:absolute;bottom:8%;left:50%;transform:translateX(-50%);display:none;flex-direction:column;gap:1.6vmin;width:88%;max-height:50vh;overflow-y:auto;z-index:40}
.btn{font-size:4vmin;padding:2.6vmin;background:rgba(17,17,17,.92);color:#fff;border:1px solid #fff;border-radius:8px;cursor:pointer;text-align:center}
.btn.sel{background:#fff;color:#000}
#image{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);max-width:95vmin;max-height:80vmin;z-index:10;display:none;opacity:0;transition:opacity 1s}
#image.show{opacity:1}
#charBox{position:absolute;bottom:8%;left:50%;transform:translateX(-50%);display:none;flex-wrap:wrap;gap:1.2vmin;width:92%;justify-content:center;z-index:50}
.charBtn{font-size:3.4vmin;padding:1.6vmin 2.2vmin;background:rgba(0,0,0,.85);border:1px solid #fff;color:#fff;border-radius:6px;cursor:pointer}
#charLine{position:absolute;bottom:22%;left:50%;transform:translateX(-50%);width:90%;background:rgba(0,0,0,.9);padding:2vmin;border-radius:8px;font-size:3.6vmin;text-align:center;display:none;z-index:55}
#consigne{position:absolute;top:8%;left:50%;transform:translateX(-50%);font-size:3.6vmin;text-align:center;z-index:45;display:none;white-space:pre-line}
</style>
</head>
<body>
<button id="start">Touchez pour entrer</button>
<button id="restart">Recommencer</button>

<div id="text"></div>
<div id="choices"></div>
<img id="image" alt="">
<div id="consigne"></div>
<div id="charBox"></div>
<div id="charLine"></div>

<audio id="narrateur" src="narrateur.mp3" preload="auto" playsinline></audio>

<script>
const $=id=>document.getElementById(id);
const start=$('start'), restart=$('restart'), text=$('text'), choices=$('choices'), image=$('image'), charBox=$('charBox'), charLine=$('charLine'), consigne=$('consigne'), narrateur=$('narrateur');

const show=el=>el.style.display='block';
const hide=el=>el.style.display='none';
const flex=el=>el.style.display='flex';
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

function showText(t,hold=3000,pos='center'){
  text.className=''; text.classList.add(pos);
  text.textContent=t; show(text);
  return sleep(hold).then(()=>hide(text));
}
function showTextStay(t,pos='center'){
  text.className=''; text.classList.add(pos);
  text.textContent=t; show(text);
}
function showImage(src){
  return new Promise(res=>{
    image.onload=()=>{show(image); requestAnimationFrame(()=>image.classList.add('show')); res();};
    image.onerror=()=>{show(image); image.classList.add('show'); res();};
    image.src=src;
  });
}
function hideImage(){
  return new Promise(async res=>{
    image.classList.remove('show');
    await sleep(1000);
    hide(image); image.src='';
    res();
  });
}
async function play(a){try{await a.play();}catch{}}

function askMulti(q,opts){
  return new Promise(res=>{
    showTextStay(q,'center');
    choices.innerHTML='';
    const sel=new Set();
    opts.forEach(o=>{
      const b=document.createElement('button'); b.className='btn'; b.textContent=o;
      b.onclick=()=>{b.classList.toggle('sel'); sel.has(o)?sel.delete(o):sel.add(o);};
      choices.appendChild(b);
    });
    const ok=document.createElement('button'); ok.className='btn'; ok.textContent='Valider'; ok.style.marginTop='1vmin'; ok.style.background='#fff'; ok.style.color='#000';
    ok.onclick=()=>{hide(text); hide(choices); res([...sel]);};
    choices.appendChild(ok);
    flex(choices);
  });
}

async function run(){
  hide(start); hide(restart);

  await play(narrateur);
  await new Promise(r=>{narrateur.onended=r; setTimeout(r,8000);});
  await sleep(3000);

  const opts = ['Petite','Grande','Lumineuse','Sombre','Ordonnée','En bazar'];
  const rep = await askMulti('Avant d\'entrer — vous imaginez cette pièce comment ?', opts);
  localStorage.setItem('qr12_ambiance', JSON.stringify(rep));

  const qr11Raw = localStorage.getItem('qr11_bureau');
  if(qr11Raw){
    try{
      const arr = JSON.parse(qr11Raw).map(s=>s.toLowerCase());
      const repLow = rep.map(s=>s.toLowerCase());
      const inter = repLow.filter(x=>arr.includes(x));
      if(inter.length>0){
        await showText('Tiens, comme la salle de M. Vidal.',3500,'center');
      }else{
        await showText('Tiens, différemment de la salle de M. Vidal.',3500,'center');
      }
    }catch{}
  }

  await showImage('touslessuspects.jpg');
  await sleep(5000);
  consigne.textContent = 'Touchez le personnage qui vous intéresse le plus.';
  show(consigne);

  const persos = [
    {id:'Vidal', line:'Vidal : Bras croisés. La montre neuve. Il attend que ça finisse.'},
    {id:'Noé', line:'Noé : Regard sur ses chaussures. La posture des mauvais jours.'},
    {id:'Rémy', line:'Rémy : Bras bandé de l\'épaule aux doigts. Il aurait préféré rester à l\'hôpital.'},
    {id:'Chloé', line:'Chloé : Elle arrive en dernier. Sa démarche quand elle est stressée.'},
    {id:'Colin', line:'Colin : Mains dans les poches. Il regarde personne en particulier.'},
    {id:'Sam', line:'Sam : Assis au centre. Il regarde Inès.'},
    {id:'Inès', line:'Inès : Debout. Elle a demandé à être debout.'}
  ];
  charBox.innerHTML='';
  persos.forEach(p=>{
    const b=document.createElement('button'); b.className='charBtn'; b.textContent=p.id;
    b.onclick=async ()=>{
      localStorage.setItem('qr12_focus', p.id);
      charBox.style.display='none';
      hide(consigne);

      const qr11First = localStorage.getItem('qr11_carnet_first');
      if(qr11First && qr11First.toLowerCase() === p.id.toLowerCase()){
        await showText('Ce personnage vous intrigue... vous aviez choisi '+qr11First+' en premier dans le carnet de M. Vidal.',4000,'center');
      }

      charLine.textContent = p.line;
      show(charLine);
      await sleep(6500);
      hide(charLine);
      await hideImage();
      await phase5();
    };
    charBox.appendChild(b);
  });
  flex(charBox);
}

async function phase5(){
  showTextStay('Dans quelques secondes vous allez lire.\nChaque personnage dans cette pièce a une raison d\'être là.\nVous aussi vous savez des choses sur eux.\nUtilisez-les.','center');
  show(restart);
}

start.onclick = run;
restart.onclick = ()=> location.reload();
</script>
</body>
</html>
