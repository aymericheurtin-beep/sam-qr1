<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QR12</title>
<style>
html,body{margin:0;height:100%;background:#000;color:#fff;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;overflow:hidden}

#start{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(20px,5vmin,26px);padding:20px 40px;background:#fff;color:#000;border:none;border-radius:10px;cursor:pointer;z-index:100;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.6}}

#restart{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);font-size:clamp(18px,4vmin,22px);padding:15px 30px;background:#fff;color:#000;border:none;border-radius:10px;cursor:pointer;z-index:100;display:none}

#text{position:absolute;left:50%;transform:translateX(-50%);width:92%;text-align:center;font-size:clamp(18px,4.2vmin,26px);line-height:1.5;z-index:50;display:none;white-space:pre-line;text-shadow:0 0 8px #000}
#text.center{top:50%;transform:translate(-50%,-50%)}
#text.bottom{bottom:6%;font-size:clamp(16px,3.6vmin,22px);background:rgba(0,0,0,.82);padding:1.8vmin 2.5vmin;border-radius:8px;max-width:88%;top:auto;transform:translateX(-50%)}

#countdown{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(60px,18vmin,120px);font-family:'Courier New',monospace;color:#fff;opacity:0;z-index:60;text-shadow:0 0 20px #fff;transition:opacity .3s;pointer-events:none}

#sceneWrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:none;z-index:20;line-height:0}
#sceneImg{display:block;max-width:96vw;max-height:82vh;width:auto;height:auto}

.zone{position:absolute;cursor:pointer;border-radius:4px;border:2px solid transparent;transition:border-color .15s,background .15s;box-sizing:border-box}
.zone:hover,.zone.active{border-color:rgba(255,255,255,.6);background:rgba(255,255,255,.08)}

.zone-label{position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);color:#fff;font-size:clamp(13px,3vmin,17px);padding:4px 10px;border-radius:4px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:90;border:1px solid rgba(255,255,255,.3)}
.zone:hover .zone-label,.zone.active .zone-label{opacity:1}

#tooltip{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,.93);color:#fff;font-size:clamp(16px,3.8vmin,22px);line-height:1.55;text-align:center;padding:3vmin 4vmin 4vmin;z-index:80;display:none;border-top:1px solid rgba(255,255,255,.18)}
#tooltip strong{display:block;font-size:clamp(18px,4.5vmin,26px);margin-bottom:1vmin;letter-spacing:.05em;text-transform:uppercase}
#tooltipClose{display:inline-block;margin-top:2vmin;padding:1.5vmin 4vmin;background:#fff;color:#000;border:none;border-radius:6px;font-size:clamp(15px,3.5vmin,20px);cursor:pointer;font-family:inherit}

#imageHint{position:absolute;bottom:2%;left:50%;transform:translateX(-50%);font-size:clamp(13px,2.8vmin,17px);color:rgba(255,255,255,.55);font-style:italic;text-align:center;z-index:30;pointer-events:none;white-space:nowrap;transition:opacity .5s}

#inesCropWrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:45vmin;height:60vmin;overflow:hidden;display:none;z-index:25;border:2px solid #fff;border-radius:8px;background:#000}
#inesCropWrap img{position:absolute;width:300%;height:200%;top:0;left:0}

#stats{position:fixed;top:5vmin;right:5vmin;font-size:clamp(13px,3vmin,17px);z-index:30;display:none;text-align:right;line-height:1.6;background:rgba(0,0,0,.7);padding:1.5vmin 2vmin;border-radius:8px;border:1px solid rgba(255,255,255,.15)}
</style>
</head>
<body>

<button id="start" onclick="run()">Touchez pour entrer</button>
<button id="restart" onclick="location.reload()">Recommencer</button>
<div id="text"></div>
<div id="countdown"></div>

<div id="sceneWrap">
    <img id="sceneImg" src="touslessuspects.jpg" alt="La réunion">
  <div class="zone" data-who="Rémy"  style="left:7.8%;  top:12.0%; width:9.8%; height:35.0%"><span class="zone-label">Rémy</span></div>
  <div class="zone" data-who="Vidal" style="left:25.3%; top:14.8%; width:11.7%; height:22.9%"><span class="zone-label">Vidal</span></div>
  <div class="zone" data-who="Inès"  style="left:61.0%; top:17.7%; width:14.0%; height:37.5%"><span class="zone-label">Inès</span></div>
  <div class="zone" data-who="Colin" style="left:86.0%; top:15.0%; width:12.0%; height:52.0%"><span class="zone-label">Colin</span></div>
  <div class="zone" data-who="Sam"   style="left:30.9%; top:39.9%; width:23.3%; height:41.3%"><span class="zone-label">Sam</span></div>
  <div class="zone" data-who="Noé"   style="left:0.0%;  top:40.0%; width:29.1%; height:41.0%"><span class="zone-label">Noé</span></div>
  <div class="zone" data-who="Chloé" style="left:65.0%; top:25.0%; width:22.5%; height:67.2%"><span class="zone-label">Chloé</span></div>
  <div id="imageHint">Touchez un personnage</div>
</div>

<div id="tooltip">
  <strong id="tooltipName"></strong>
  <span id="tooltipDesc"></span><br>
  <button id="tooltipClose">Fermer</button>
</div>

<div id="inesCropWrap"><img id="inesCropImg" src="ines_5_choix.jpg" alt=""></div>
<div id="stats"></div>

<audio id="narrateur" src="narrateur.mp3" preload="auto" playsinline></audio>
<audio id="porte"     src="porte.mp3"     preload="auto" playsinline></audio>

<script>
const $=id=>document.getElementById(id);
const start=$('start'),restart=$('restart'),text=$('text'),countdown=$('countdown');
const sceneWrap=$('sceneWrap'),sceneImg=$('sceneImg');
const tooltip=$('tooltip'),tooltipName=$('tooltipName'),tooltipDesc=$('tooltipDesc');
const tooltipClose=$('tooltipClose'),imageHint=$('imageHint');
const stats=$('stats');
const cropWrap=$('inesCropWrap'),cropImg=$('inesCropImg');
const narrateur=$('narrateur'),porte=$('porte');

const descriptions={
  'Rémy' :"Bras bandé de l'épaule aux doigts. Il aurait préféré rester à l'hôpital.",
  'Sam'  :"Assis au centre. Il regarde Inès.",
  'Vidal':"Bras croisés. La montre neuve. Il attend que ça finisse.",
  'Inès' :"Debout. Elle a demandé à être debout.",
  'Colin':"Mains dans les poches. Il regarde personne en particulier.",
  'Chloé':"Elle arrive en dernier. Une démarche particulière lorsqu'elle est stressée.",
  'Noé'  :"Regard sur ses chaussures. La posture des mauvais jours."
};

function show(el){el.style.display='block'}
function hide(el){el.style.display='none'}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function showText(t,pos='center'){text.className='';text.classList.add(pos);text.textContent=t;show(text)}
function hideText(){hide(text)}
async function play(a){try{await a.play()}catch{}}
function normalize(s){return(s||'').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim()}

function addUsed(id){
  const set=new Set(JSON.parse(localStorage.getItem('qr_used_set')||'[]'));
  set.add(id);
  localStorage.setItem('qr_used_set',JSON.stringify([...set]));
  return set.size;
}

async function runCountdown(from){
  countdown.style.opacity='1';
  for(let i=from;i>=1;i--){
    countdown.textContent=i;
    await sleep(900);
  }
  countdown.style.opacity='0';
  countdown.textContent='';
  await sleep(300);
}

function calibrateZones(){
  const rect=sceneImg.getBoundingClientRect();
  const wrapRect=sceneWrap.getBoundingClientRect();
  const offX=rect.left-wrapRect.left;
  const offY=rect.top-wrapRect.top;
  document.querySelectorAll('.zone').forEach(z=>{
    const lPct=parseFloat(z.style.left);
    const tPct=parseFloat(z.style.top);
    const wPct=parseFloat(z.style.width);
    const hPct=parseFloat(z.style.height);
    z.style.left  =(offX+lPct/100*rect.width)+'px';
    z.style.top   =(offY+tPct/100*rect.height)+'px';
    z.style.width =(wPct/100*rect.width)+'px';
    z.style.height=(hPct/100*rect.height)+'px';
  });
}

let zonesUnlocked=false;
let touchedCount=0;
let lastWho='';

function setupZones(){
  document.querySelectorAll('.zone').forEach(z=>{
    z.addEventListener('click',()=>{
      if(!zonesUnlocked)return;
      const who=z.dataset.who;
      lastWho=who;
      document.querySelectorAll('.zone').forEach(z2=>z2.classList.remove('active'));
      z.classList.add('active');
      tooltipName.textContent=who;
      tooltipDesc.textContent=descriptions[who]||'';
      show(tooltip);
      touchedCount++;
      if(touchedCount===1) imageHint.style.opacity='0';
    });
  });
  tooltipClose.addEventListener('click',()=>{
    hide(tooltip);
    document.querySelectorAll('.zone').forEach(z=>z.classList.remove('active'));
  });
}

async function showInesZoom(){
  const choice=parseInt(localStorage.getItem('qr4_ines_choice')||'0',10);
  if(choice>=1&&choice<=5){
    const col=(choice-1)%3,row=Math.floor((choice-1)/3);
    cropImg.style.left=`-${col*100}%`;
    cropImg.style.top=`-${row*100}%`;
    show(cropWrap);
    showText("C'était votre Inès.",'bottom');
    await sleep(4500);
    hideText();
    hide(cropWrap);
  }
}

async function run(){
  hide(start);
  const used=addUsed('qr12');

  // — PHASE 1 : pont carnet —
  const firstCarnet=(localStorage.getItem('qr11_carnet_first')||'').toUpperCase();
  if(firstCarnet==='LAVELOT'){
    showText("Dans le carnet de Vidal, vous aviez cliqué sur Lavelot en premier.\nIl est dans cette pièce.",'center');
    await sleep(5000); hideText(); await sleep(400);
  } else if(firstCarnet==='MOREL'){
    showText("Dans le carnet de Vidal, vous aviez cliqué sur Morel en premier.\nIl est dans cette pièce.",'center');
    await sleep(5000); hideText(); await sleep(400);
  } else if(firstCarnet==='DUBOIS'){
    showText("Dans le carnet de Vidal, vous aviez cliqué sur Dubois en premier.\nElle est dans cette pièce.",'center');
    await sleep(5000); hideText(); await sleep(400);
  }

  // — PHASE 2 : tension montante —
  showText('Mercredi. 8h31.\nBureau de Mme Arnaud.','center');
  await sleep(3000); hideText(); await sleep(500);

  showText('Ils sont sept.\nUne pièce prévue pour trois.','center');
  await sleep(3000); hideText(); await sleep(500);

  await play(porte);
  await sleep(600);
  await runCountdown(5);

  // — PHASE 3 : image + zones —
  show(sceneWrap);
  sceneImg.style.opacity='0';
  sceneImg.style.transition='opacity 1.2s';
  await new Promise(res=>{ if(sceneImg.complete)res(); else sceneImg.onload=res; });
  await sleep(50);
  sceneImg.style.opacity='1';
  calibrateZones();
  await sleep(1200);

  await play(narrateur);
  await sleep(7000);
  try{narrateur.pause();narrateur.currentTime=0}catch{}

  zonesUnlocked=true;
  imageHint.style.opacity='1';

  // Attendre premier tap (max 40 sec)
  await new Promise(res=>{
    let waited=0;
    const check=setInterval(()=>{
      waited+=500;
      if(touchedCount>=1||waited>=40000){clearInterval(check);res();}
    },500);
  });
  // Attendre fermeture du tooltip pour laisser le temps de lire le commentaire
  await new Promise(res=>{
    const check=setInterval(()=>{
      if(tooltip.style.display==='none'){clearInterval(check);res();}
    },200);
  });
// Attendre fermeture du tooltip pour laisser le temps de lire le commentaire
  await new Promise(res=>{
    const check=setInterval(()=>{
      if(tooltip.style.display==='none'){clearInterval(check);res();}
    },200);
  });
// Bonus Inès
  if(lastWho==='Inès') await showInesZoom();

  // Bonus Vidal reconnu dans QR11
  if(lastWho==='Vidal'){
    const vidalMatch=localStorage.getItem('qr11_vidal_match')||'';
    if(normalize(vidalMatch).includes('oui')){
      hide(sceneWrap); hide(tooltip);
      await sleep(300);
      showText("Vous l'aviez reconnu.",'center');
      await sleep(3000); hideText();
    }
  }

  // — PHASE 4 : instruction de lecture —
  hide(sceneWrap); hide(tooltip);
  await sleep(400);

  showText("Dans quelques instant, vous allez lire la suite de ce roman.
Chaque personnage dans cette pièce a une raison d'être là.
Vous aussi, vous savez des choses sur eux.
Utilisez-les.",'center');
  await sleep(12000);
  hideText();

  stats.innerHTML=`Scans proposés : 12<br>Scans utilisés : ${used}`;
  show(stats);
  show(restart);
}

setupZones();
window.addEventListener('resize',()=>{ if(sceneWrap.style.display!=='none') calibrateZones(); });
</script>
</body>
</html>
