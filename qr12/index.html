<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>QR12</title>
<style>
html,body{margin:0;height:100%;background:#000;color:#fff;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;overflow:hidden}
#start,#restart{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:5vmin;padding:4vmin 8vmin;background:#fff;color:#000;border:none;border-radius:10px;cursor:pointer;z-index:100}
#restart{display:none}
#text{position:absolute;left:50%;transform:translateX(-50%);width:92%;text-align:center;font-size:4.6vmin;line-height:1.35;z-index:30;display:none;white-space:pre-line;text-shadow:0 0 6px #000}
#text.center{top:8%}
#text.bottom{bottom:6%;font-size:3.6vmin;background:rgba(0,0,0,.75);padding:1.6vmin 2.2vmin;border-radius:8px;max-width:85%}
#choices{position:absolute;bottom:8%;left:50%;transform:translateX(-50%);display:none;flex-direction:column;gap:1.6vmin;width:88%;max-height:45vh;overflow-y:auto;padding-bottom:2vmin;z-index:80;-webkit-overflow-scrolling:touch}
.btn{font-size:3.8vmin;padding:2.4vmin;background:rgba(17,17,17,.92);color:#fff;border:1px solid #fff;border-radius:8px;cursor:pointer;text-align:center;flex-shrink:0;backdrop-filter:blur(2px)}
.btn.sel{background:#fff;color:#000}
#image{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);max-width:90vmin;max-height:78vmin;z-index:10;display:none;cursor:pointer;transition:transform .3s ease, opacity 1.2s}
#image.zoomed{max-width:none;max-height:none;width:200vmin;height:auto;top:60%;left:50%;transform:translate(-50%,-50%);z-index:60}
#carnetBox{position:absolute;top:5%;left:50%;transform:translateX(-50%);width:92%;display:none;flex-direction:column;gap:1.2vmin;z-index:70;max-height:30vh;overflow-y:auto}
.carnetBtn{font-size:3.4vmin;padding:1.8vmin;background:rgba(0,0,0,.85);border:1px solid #fff;color:#fff;border-radius:6px;cursor:pointer;text-align:center;flex-shrink:0}
.carnetBtn.used{opacity:.4}
#carnetLine{position:absolute;bottom:12%;left:50%;transform:translateX(-50%);width:90%;background:rgba(0,0,0,.9);padding:2.2vmin;border-radius:8px;font-size:3.8vmin;line-height:1.4;text-align:center;display:none;z-index:75}
#carnetLine u{text-decoration:underline;text-decoration-thickness:2px;text-underline-offset:3px}
#hint{position:absolute;bottom:2%;left:50%;transform:translateX(-50%);font-size:3.2vmin;color:#fff;background:rgba(0,0,0,.6);padding:1vmin 2vmin;border-radius:6px;z-index:65;display:none;pointer-events:none}
</style>
</head>
<body>
<button id="start">Touchez pour commencer</button>
<button id="restart">Recommencer</button>
<div id="text"></div>
<div id="choices"></div>
<img id="image" alt="">
<div id="carnetBox"></div>
<div id="carnetLine"></div>
<div id="hint"></div>
<div id="stats" style="position:absolute;bottom:5vmin;right:6vmin;font-size:4vmin;z-index:30;display:none;text-shadow:0 0 8px #000;text-align:right;line-height:1.4;background:rgba(0,0,0,.6);padding:1.5vmin 2vmin;border-radius:8px"></div>
<audio id="narrateur" src="narrateur.mp3" preload="auto" playsinline></audio>

<script>
const $ = id => document.getElementById(id);
const start=$('start'), restart=$('restart'), text=$('text'), choices=$('choices'), image=$('image'), carnetBox=$('carnetBox'), carnetLine=$('carnetLine'), hint=$('hint'), stats=$('stats'), narrateur=$('narrateur');
const show=el=>el.style.display='block'; const hide=el=>el.style.display='none'; const flex=el=>el.style.display='flex'; const sleep=ms=>new Promise(r=>setTimeout(r,ms));
function showText(t,hold=3000,pos='center'){ text.className=''; text.classList.add(pos); text.textContent=t; show(text); return sleep(hold).then(()=>hide(text)); }
function showTextStay(t,pos='center'){ text.className=''; text.classList.add(pos); text.textContent=t; show(text); }
function showImage(src){ return new Promise(res=>{ image.onload=()=>{show(image); image.style.opacity='1'; res();}; image.onerror=()=>{ console.warn('Image manquante:',src); show(image); res();}; image.classList.remove('zoomed'); image.style.opacity='0'; setTimeout(()=>{image.src=src;},50); }); }
function hideImage(){ return new Promise(async res=>{ image.style.opacity='0'; await sleep(1200); hide(image); hide(hint); image.src=''; image.classList.remove('zoomed'); res(); }); }
async function play(a){ try{ await a.play(); }catch{} }
function stopAudio(a){ try{ a.pause(); a.currentTime=0; }catch{} }
function askMulti(q,opts){ return new Promise(res=>{ showTextStay(q,'center'); choices.innerHTML=''; const sel=new Set(); opts.forEach(o=>{ const b=document.createElement('button'); b.className='btn'; b.textContent=o; b.onclick=()=>{ b.classList.toggle('sel'); sel.has(o)?sel.delete(o):sel.add(o); }; choices.appendChild(b); }); const ok=document.createElement('button'); ok.className='btn'; ok.textContent='Valider'; ok.style.marginTop='1vmin'; ok.style.background='#fff'; ok.style.color='#000'; ok.onclick=()=>{ hide(text); hide(choices); res([...sel]); }; choices.appendChild(ok); flex(choices); choices.scrollTop=0; }); }
function askSingle(q,opts){ return new Promise(res=>{ showTextStay(q,'center'); choices.innerHTML=''; opts.forEach(o=>{ const b=document.createElement('button'); b.className='btn'; b.textContent=o; b.onclick=()=>{ hide(text); hide(choices); res(o); }; choices.appendChild(b); }); flex(choices); choices.scrollTop=0; }); }

const descriptions = {
 'Vidal': "Bras croisĂ©s. La montre neuve. Il attend que Ă§a finisse.",
 'NoĂ©': "Regard sur ses chaussures. La posture des mauvais jours.",
 'RĂ©my': "Bras bandĂ© de lâ€™Ă©paule aux doigts. Il aurait prĂ©fĂ©rĂ© rester Ă  lâ€™hĂ´pital.",
 'ChloĂ©': "Elle arrive en dernier. Sa dĂ©marche quand elle est stressĂ©e.",
 'Colin': "Mains dans les poches. Il regarde personne en particulier.",
 'Sam': "Assis au centre. Il regarde InĂ¨s.",
 'InĂ¨s': "Debout. Elle a demandĂ© Ă  ĂŞtre debout."
};

function normalize(s){ return (s||'').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim(); }

async function run(){
 hide(start); hide(restart); hide(stats);
 // inc scans
 const used = (parseInt(localStorage.getItem('scans_used')||'0',10)+1);
 localStorage.setItem('scans_used', used);

 await play(narrateur);
 await sleep(8000);
 stopAudio(narrateur);

 const repPiece = await askMulti('Comment imaginez-vous cette piĂ¨ce ?', ['Petite','Grande','Lumineuse','Sombre','OrdonnĂ©e','En bazar']);

 let bureau = [];
 try{ bureau = JSON.parse(localStorage.getItem('qr11_bureau')||'[]'); }catch{}
 const map = { petite:'petit', grande:'grand', lumineuse:'lumineux', sombre:'sombre', ordonnee:'ordonne', 'en bazar':'en bazar' };
 const norm = arr => arr.map(v=> map[normalize(v)] || normalize(v)).sort().join('|');
 const same = norm(repPiece) === norm(bureau) && bureau.length>0;
 await showText(same ? "Tiens, comme le bureau de M. Vidal." : "Tiens, diffĂ©remment du bureau de M. Vidal.",2500,'center');

 await showImage('touslessuspects.jpg');
 await sleep(5000);
 await hideImage();

 const charChoice = await askSingle('Appuyez sur le personnage qui vous intĂ©resse le plus.', ['Vidal','NoĂ©','RĂ©my','ChloĂ©','Colin','Sam','InĂ¨s']);

 let txt = descriptions[charChoice] || '';
 const firstCarnet = localStorage.getItem('qr11_first_carnet')||'';
 if(normalize(firstCarnet) === normalize(charChoice)){
   txt += "\n\nCe personnage doit vous intriguer, vous lâ€™aviez Ă©galement choisi en premier dans le carnet de M. Vidal.";
 }
 await showText(txt,6000,'center');

 if(charChoice === 'InĂ¨s' && localStorage.getItem('qr4_ines')){
   await showImage(localStorage.getItem('qr4_ines'));
   await sleep(4000);
   await hideImage();
 }

 await showText("Dans quelques secondes vous allez lire la suite du roman.\nChaque personnage dans cette piĂ¨ce a une raison dâ€™ĂŞtre lĂ .\nVous aussi vous savez des choses sur eux.\nUtilisez-les.",7000,'center');

 const total = parseInt(localStorage.getItem('scans_total')||'12',10);
 stats.innerHTML = `Scans proposĂ©s : ${total}<br>Scans utilisĂ©s : ${used}`;
 show(stats);
 show(restart);
}

start.onclick = run;
restart.onclick = ()=> location.reload();
</script>
</body>
</html>
