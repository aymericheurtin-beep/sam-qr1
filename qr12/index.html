<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>QR12</title>
<style>
html,body{
  margin:0;
  height:100%;
  background:#000;
  color:#fff;
  font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  overflow:hidden;
}
#start,#restart{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:5vmin;
  padding:4vmin 8vmin;
  background:#fff;
  color:#000;
  border:none;
  border-radius:10px;
  cursor:pointer;
  z-index:100;
}
#restart{
  display:none;
}
#text{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  text-align:center;
  font-size:5vmin;
  line-height:1.35;
  z-index:30;
  display:none;
  white-space:pre-line;
  text-shadow:0 0 6px #000;
}
#text.center{
  top:8%;
}
#text.bottom{
  bottom:6%;
  font-size:3.8vmin;
  background:rgba(0,0,0,.75);
  padding:1.8vmin 2.5vmin;
  border-radius:8px;
  max-width:85%;
}
#text.top{
  top:8%;
}
#choices{
  position:absolute;
  top:28%;
  left:50%;
  transform:translateX(-50%);
  display:none;
  flex-direction:column;
  gap:2.2vmin;
  width:88%;
  z-index:30;
}
.btn{
  font-size:4vmin;
  padding:3vmin;
  background:#111;
  color:#fff;
  border:1px solid #fff;
  border-radius:8px;
  cursor:pointer;
  text-align:center;
}
.btn.validate{
  background:#fff;
  color:#000;
  margin-top:2vmin;
}
.choice{
  display:flex;
  align-items:center;
  gap:2vmin;
  background:#111;
  border:1px solid #fff;
  border-radius:8px;
  padding:2.5vmin;
  font-size:4vmin;
  cursor:pointer;
}
.choice input{
  width:4vmin;
  height:4vmin;
}
#image{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  max-width:90vmin;
  max-height:78vmin;
  z-index:10;
  display:none;
}
#stats{
  position:absolute;
  bottom:5vmin;
  right:6vmin;
  font-size:4vmin;
  z-index:30;
  display:none;
  text-shadow:0 0 8px #000;
  text-align:right;
  line-height:1.4;
  background:rgba(0,0,0,.6);
  padding:1.5vmin 2vmin;
  border-radius:8px;
}
/* Unification typo */
#text,.btn,.choice{
  font-size:clamp(14px,4vmin,28px);
}
#text.bottom,#stats{
  font-size:clamp(13px,3.8vmin,24px);
}
</style>
</head>
<body>
<button id="start">Démarrer</button>
<button id="restart">Recommencer</button>
<div id="text"></div>
<div id="choices"></div>
<img id="image" alt="" />
<div id="stats"></div>
<audio id="narrateur" src="narrateur.mp3" preload="auto"></audio>

<script>
const $ = id => document.getElementById(id);
const show = el => el.style.display = 'block';
const hide = el => el.style.display = 'none';
const flex = el => el.style.display = 'flex';
const sleep = ms => new Promise(r => setTimeout(r, ms));

const textEl = $('text');
const choicesEl = $('choices');
const imageEl = $('image');
const statsEl = $('stats');
const startBtn = $('start');
const restartBtn = $('restart');
const narrateur = $('narrateur');

function setTextClass(pos){
  textEl.className = '';
  textEl.classList.add(pos || 'center');
}
async function showText(t, hold = 2500, pos = 'center'){
  setTextClass(pos);
  textEl.textContent = t;
  show(textEl);
  await sleep(hold);
  hide(textEl);
}
function showTextStay(t, pos = 'center'){
  setTextClass(pos);
  textEl.textContent = t;
  show(textEl);
}
function hideText(){ hide(textEl); }

function normalize(s){
  return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();
}

function askMulti(q, opts){
  return new Promise(resolve=>{
    showTextStay(q,'top');
    choicesEl.innerHTML = '';
    opts.forEach(opt=>{
      const label = document.createElement('label');
      label.className = 'choice';
      const input = document.createElement('input');
      input.type = 'checkbox';
      input.value = opt;
      label.appendChild(input);
      label.appendChild(document.createTextNode(opt));
      choicesEl.appendChild(label);
    });
    const btn = document.createElement('button');
    btn.className = 'btn validate';
    btn.textContent = 'Valider';
    btn.onclick = ()=>{
      const selected = Array.from(choicesEl.querySelectorAll('input:checked')).map(i=>i.value);
      hide(choicesEl);
      hideText();
      choicesEl.innerHTML = '';
      resolve(selected);
    };
    choicesEl.appendChild(btn);
    flex(choicesEl);
  });
}

function askSingle(q, opts){
  return new Promise(resolve=>{
    // q already shown via showTextStay before call
    choicesEl.innerHTML = '';
    opts.forEach(opt=>{
      const btn = document.createElement('button');
      btn.className = 'btn';
      btn.textContent = opt;
      btn.onclick = ()=>{
        hide(choicesEl);
        hideText();
        choicesEl.innerHTML = '';
        resolve(opt);
      };
      choicesEl.appendChild(btn);
    });
    flex(choicesEl);
  });
}

function playAudioWithTimeout(audio, timeout=6000){
  return new Promise(resolve=>{
    let done = false;
    const finish = ()=>{
      if(done) return;
      done = true;
      resolve();
    };
    audio.onended = finish;
    audio.play().catch(()=>{});
    setTimeout(finish, timeout);
  });
}

const descriptions = {
  'Vidal': "Bras croisés. La montre neuve. Il attend que ça finisse.",
  'Noé': "Regard sur ses chaussures. La posture des mauvais jours.",
  'Rémy': "Bras bandé de l’épaule aux doigts. Il aurait préféré rester à l’hôpital.",
  'Chloé': "Elle arrive en dernier. Sa démarche quand elle est stressée.",
  'Colin': "Mains dans les poches. Il regarde personne en particulier.",
  'Sam': "Assis au centre. Il regarde Inès.",
  'Inès': "Debout. Elle a demandé à être debout."
};

async function showImageSrc(src, duration){
  return new Promise(resolve=>{
    imageEl.onload = ()=>{ show(imageEl); };
    imageEl.onerror = ()=>{ hide(imageEl); resolve(); };
    imageEl.src = src;
    show(imageEl);
    setTimeout(()=>{
      hide(imageEl);
      resolve();
    }, duration);
  });
}

async function showImageWithFallback(base, duration){
  return new Promise(resolve=>{
    let triedPng = false;
    imageEl.onerror = ()=>{
      if(!triedPng){
        triedPng = true;
        imageEl.src = base.replace(/\.jpg$/i,'.png');
      }else{
        hide(imageEl);
        resolve();
      }
    };
    imageEl.onload = ()=>{ show(imageEl); };
    imageEl.src = base;
    setTimeout(()=>{
      hide(imageEl);
      resolve();
    }, duration);
  });
}

async function run(){
  if(localStorage.getItem('qr12_done') === '1'){
    hide(startBtn);
    await showText("Vous avez déjà terminé cette étape.", 2500, 'center');
    show(restartBtn);
    return;
  }
  hide(startBtn);
  hide(restartBtn);

  // inc scans_used
  const used = (parseInt(localStorage.getItem('scans_used') || '0',10) || 0) + 1;
  localStorage.setItem('scans_used', used);

  await playAudioWithTimeout(narrateur, 6000);
  await sleep(3000);

  const multi = await askMulti("Avant d’entrer — vous imaginez cette pièce comment ?", ['Petite','Grande','Lumineuse','Sombre','Ordonnée','En bazar']);

  // Compare with qr11_bureau
  let bureauArr = [];
  try{
    bureauArr = JSON.parse(localStorage.getItem('qr11_bureau') || '[]');
  }catch(e){}
  const map = {
    'petite':'petit',
    'grande':'grand',
    'lumineuse':'lumineux',
    'sombre':'sombre',
    'ordonnee':'ordonne',
    'en bazar':'en bazar'
  };
  const normMulti = multi.map(m=> normalize(m)).map(m=> map[m] || m);
  const normBureau = bureauArr.map(b=> normalize(b));
  const setA = new Set(normMulti);
  const setB = new Set(normBureau);
  const same = setA.size === setB.size && [...setA].every(v=> setB.has(v));
  await showText(same ? "Tiens, comme le bureau de M. Vidal." : "Tiens, différemment du bureau de M. Vidal.", 2500, 'center');

  await showImageWithFallback('touslessuspects.jpg', 5000);
  hide(imageEl);

  showTextStay("Appuyez sur le personnage qui vous intéresse le plus.", 'top');
  const choice = await askSingle(null, ['Vidal','Noé','Rémy','Chloé','Colin','Sam','Inès']);

  let txt = descriptions[choice] || '';
  const firstCarnet = normalize(localStorage.getItem('qr11_first_carnet') || '');
  if(firstCarnet && firstCarnet === normalize(choice)){
    txt += "\n\nCe personnage doit vous intriguer, vous l’aviez également choisi en premier dans le carnet de M. Vidal.";
  }
  await showText(txt, 6000, 'center');

  if(choice === 'Inès'){
    const inesSrc = localStorage.getItem('qr4_ines');
    if(inesSrc){
      await showImageSrc(inesSrc, 4000);
    }
  }

  await showText("Dans quelques secondes vous allez lire la suite du roman.\nChaque personnage dans cette pièce a une raison d’être là.\nVous aussi vous savez des choses sur eux.\nUtilisez-les.", 7000, 'center');

  const total = parseInt(localStorage.getItem('scans_total') || '12',10);
  const usedNow = parseInt(localStorage.getItem('scans_used') || '1',10);
  const left = Math.max(0, total - usedNow);
  statsEl.textContent = `Scans proposés : ${total}\nScans utilisés : ${usedNow}\nÀ toi de jouer sans aide : ${left}`;
  show(statsEl);

  localStorage.setItem('qr12_done','1');
  show(restartBtn);
}

startBtn.onclick = run;
restartBtn.onclick = ()=> location.reload();
</script>
</body>
</html>
