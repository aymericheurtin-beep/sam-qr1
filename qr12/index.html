<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QR12</title>
<style>
html,body{margin:0;height:100%;background:#000;color:#fff;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;overflow:hidden}
#start,#restart{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:5vmin;padding:4vmin 8vmin;background:#fff;color:#000;border:none;border-radius:10px;cursor:pointer;z-index:100}
#restart{display:none}
#text{position:absolute;left:50%;transform:translateX(-50%);width:92%;text-align:center;font-size:5vmin;line-height:1.35;z-index:30;display:none;white-space:pre-line;text-shadow:0 0 6px #000}
#text.center{top:8%}
#text.bottom{bottom:6%;font-size:3.8vmin;background:rgba(0,0,0,.75);padding:1.8vmin 2.5vmin;border-radius:8px;max-width:85%}
#choices{position:absolute;top:28%;left:50%;transform:translateX(-50%);display:none;flex-direction:column;gap:2.2vmin;width:88%;z-index:30}
.btn{font-size:4vmin;padding:3vmin;background:#111;color:#fff;border:1px solid #fff;border-radius:8px;cursor:pointer;text-align:center}
.btn.validate{background:#fff;color:#000;margin-top:2vmin}
.choice{display:flex;align-items:center;gap:2vmin;background:#111;border:1px solid #fff;border-radius:8px;padding:2.5vmin;font-size:4vmin;cursor:pointer}
.choice input{width:4vmin;height:4vmin}
#image{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);max-width:90vmin;max-height:78vmin;z-index:10;display:none}
#stats{position:absolute;bottom:5vmin;right:6vmin;font-size:4vmin;z-index:30;display:none;text-shadow:0 0 8px #000;text-align:right;line-height:1.4;background:rgba(0,0,0,.6);padding:1.5vmin 2vmin;border-radius:8px}
/* Unification typo */
.choice, .btn{font-family:inherit;font-size:4vmin;line-height:1.35}
</style>
</head>
<body>
<button id="start">Touchez pour commencer</button>
<button id="restart">Recommencer</button>
<div id="text"></div>
<div id="choices"></div>
<img id="image" alt="">
<div id="stats"></div>
<audio id="narrateur" preload="auto" src="container:///mnt/data/narrateur_qr12.mp3"></audio>
<img id="img_all" src="container:///mnt/data/touslessuspects.jpg" hidden>
<img id="img_all_png" src="container:///mnt/data/touslessuspects.png" hidden>
<img id="img_ines" src="container:///mnt/data/qr4_ines.jpg" hidden>

<script>
const $ = id => document.getElementById(id);
const show = el => el.style.display='block';
const hide = el => el.style.display='none';
const flex = el => el.style.display='flex';
const sleep = ms => new Promise(r=>setTimeout(r,ms));

function showText(txt, pos='center'){
  const t=$('text');
  t.className=pos;
  t.textContent=txt;
  show(t);
  hide($('choices'));
}

function showTextStay(txt, pos='center'){
  const t=$('text');
  t.className=pos;
  t.textContent=txt;
  show(t);
}

function askSingle(q, opts){
  return new Promise(res=>{
    if(q) showTextStay(q,'center');
    const box=$('choices');
    box.innerHTML='';
    flex(box);
    opts.forEach(opt=>{
      const b=document.createElement('div');
      b.className='btn';
      b.textContent=opt;
      b.onclick=()=>{
        hide(box);
        hide($('text'));
        res(opt);
      };
      box.appendChild(b);
    });
  });
}

function askMulti(q, opts){
  return new Promise(res=>{
    showText(q,'center');
    const box=$('choices');
    box.innerHTML='';
    flex(box);
    const selected=new Set();
    opts.forEach(opt=>{
      const label=document.createElement('label');
      label.className='choice';
      const cb=document.createElement('input');
      cb.type='checkbox';
      cb.onchange=()=>{
        if(cb.checked) selected.add(opt);
        else selected.delete(opt);
      };
      const span=document.createElement('span');
      span.textContent=opt;
      label.appendChild(cb);
      label.appendChild(span);
      label.onclick=(e)=>{
        if(e.target!==cb){
          cb.checked=!cb.checked;
          cb.onchange();
        }
      };
      box.appendChild(label);
    });
    const btn=document.createElement('div');
    btn.className='btn validate';
    btn.textContent='Valider';
    btn.onclick=()=>{
      if(selected.size===0) return;
      hide(box);
      hide($('text'));
      res(Array.from(selected));
    };
    box.appendChild(btn);
  });
}

function play(id){
  return new Promise(async resolve=>{
    const a=$(id);
    if(!a || !a.src) return resolve();
    try{
      await a.play();
      a.onended=()=>resolve();
    }catch(e){
      resolve();
    }
    setTimeout(resolve,6000);
  });
}

function normalize(arr){
  return arr.map(s=>s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")).sort();
}

const descriptions={
  'Vidal':"Vidal, 42 ans. Prof principal de la classe. Autoritaire, il impose une discipline stricte.",
  'Noé':"Noé, 17 ans. Élève discret. Toujours au fond de la classe, il observe plus qu’il ne parle.",
  'Rémy':"Rémy, 16 ans. Sportif populaire. Charismatique, mais impulsif quand on le contredit.",
  'Chloé':"Chloé, 17 ans. Déléguée de classe. Organisée, elle note tout dans son carnet.",
  'Colin':"Colin, 16 ans. Passionné d’informatique. Il passe son temps sur les ordinateurs du lycée.",
  'Sam':"Sam, 17 ans. Artiste. Carnet de croquis toujours à portée de main.",
  'Inès':"Inès, 16 ans. Nouvelle arrivée. Personne ne la connaît vraiment encore."
};

async function run(){
  hide($('start'));
  hide($('restart'));
  hide($('stats'));
  
  await play('narrateur');
  await sleep(3000);
  
  const rep=await askMulti("Comment imaginez-vous cette pièce ?", ['Petite','Grande','Lumineuse','Sombre','Ordonnée','En bazar']);
  
  const qr11bureau=JSON.parse(localStorage.getItem('qr11_bureau')||'[]');
  const a=normalize(rep);
  const b=normalize(qr11bureau);
  const identique=JSON.stringify(a)===JSON.stringify(b) && a.length>0;
  
  let pont="Votre vision correspond aux indices laissés sur place.";
  if(!qr11bureau.length){
    pont="Aucune observation préalable. Retenez bien ces détails.";
  }else if(!identique){
    const communs=a.filter(x=>b.includes(x));
    const diffs=a.filter(x=>!b.includes(x)).concat(b.filter(x=>!a.includes(x)));
    if(communs.length){
      pont=`Points communs relevés : ${communs.join(', ')}. `;
    }else{
      pont=`Vos impressions divergent des indices notés. `;
    }
    if(diffs.length){
      pont+=`Écarts : ${diffs.join(', ')}.`;
    }
  }
  
  await showText(pont,'bottom');
  await sleep(4000);
  hide($('text'));
  
  const img=$('image');
  img.src=$('img_all').src;
  img.onerror=()=>{img.src=$('img_all_png').src};
  show(img);
  await sleep(5000);
  hide(img);
  
  showTextStay("Appuyez sur le personnage qui vous intéresse le plus.",'center');
  const choix=await askSingle("", ['Vidal','Noé','Rémy','Chloé','Colin','Sam','Inès']);
  
  const qr11first=localStorage.getItem('qr11_first_carnet');
  let desc=descriptions[choix]||"";
  if(qr11first && choix===qr11first){
    desc+="\n\nVous l’aviez déjà repéré près du carnet.";
  }
  
  showText(desc,'center');
  await sleep(5000);
  
  if(choix==='Inès' && localStorage.getItem('qr4_ines')){
    hide($('text'));
    img.src=$('img_ines').src;
    show(img);
    await sleep(4000);
    hide(img);
  }
  
  hide($('text'));
  showText("Chaque détail compte. Le roman commence ici.",'bottom');
  await sleep(7000);
  hide($('text'));
  
  const stats=$('stats');
  stats.innerHTML=`Pièce : ${rep.join(', ')}<br>Suspect choisi : ${choix}`;
  show(stats);
  
  $('restart').style.display='block';
}

$('start').onclick=run;
$('restart').onclick=()=>location.reload();
</script>
</body>
</html>
