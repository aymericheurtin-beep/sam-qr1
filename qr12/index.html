<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QR12</title>
<style>
html,body{margin:0;height:100%;background:#000;color:#fff;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;overflow:hidden}

#start{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(20px,5vmin,26px);padding:20px 40px;background:#fff;color:#000;border:none;border-radius:10px;cursor:pointer;z-index:100;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.6}}

#restart{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);font-size:clamp(18px,4vmin,22px);padding:15px 30px;background:#fff;color:#000;border:none;border-radius:10px;cursor:pointer;z-index:100;display:none}

#text{position:absolute;left:50%;transform:translateX(-50%);width:92%;text-align:center;font-size:clamp(18px,4.2vmin,26px);line-height:1.5;z-index:50;display:none;white-space:pre-line;text-shadow:0 0 8px #000}
#text.center{top:50%;transform:translate(-50%,-50%)}
#text.top{top:6%}
#text.bottom{bottom:6%;font-size:clamp(16px,3.6vmin,22px);background:rgba(0,0,0,.82);padding:1.8vmin 2.5vmin;border-radius:8px;max-width:88%;top:auto;transform:translateX(-50%)}

#countdown{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(60px,18vmin,120px);font-family:'Courier New',monospace;color:#fff;opacity:0;z-index:60;text-shadow:0 0 20px #fff;transition:opacity .3s}

/* Conteneur image avec zones cliquables */
#sceneWrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:none;z-index:20}
#sceneImg{display:block;max-width:96vw;max-height:82vh;width:auto;height:auto}

/* Zones cliquables superposées */
.zone{position:absolute;cursor:pointer;border-radius:6px;border:2px solid transparent;transition:border-color .2s, background .2s}
.zone:hover,.zone.active{border-color:rgba(255,255,255,.5);background:rgba(255,255,255,.08)}

/* Tooltip personnage */
#tooltip{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,.92);color:#fff;font-size:clamp(16px,3.8vmin,22px);line-height:1.5;text-align:center;padding:3vmin 4vmin 4vmin;z-index:80;display:none;border-top:1px solid rgba(255,255,255,.2)}
#tooltip strong{display:block;font-size:clamp(18px,4.5vmin,26px);margin-bottom:1vmin;letter-spacing:.05em}
#tooltipClose{display:inline-block;margin-top:2vmin;padding:1.5vmin 4vmin;background:#fff;color:#000;border:none;border-radius:6px;font-size:clamp(15px,3.5vmin,20px);cursor:pointer}

/* Invite initiale sur l'image */
#imageHint{position:absolute;bottom:5%;left:50%;transform:translateX(-50%);font-size:clamp(14px,3vmin,18px);color:rgba(255,255,255,.6);font-style:italic;text-align:center;z-index:30;pointer-events:none;white-space:nowrap}

#choices{position:absolute;bottom:8%;left:50%;transform:translateX(-50%);display:none;flex-direction:column;gap:2vmin;width:88%;max-height:45vh;overflow-y:auto;z-index:80}
.btn{font-size:clamp(17px,4vmin,23px);padding:18px 24px;background:rgba(17,17,17,.92);color:#fff;border:1px solid #fff;border-radius:8px;cursor:pointer;text-align:center}
.btn.sel{background:#fff;color:#000}

#inesCropWrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:45vmin;height:60vmin;overflow:hidden;display:none;z-index:25;border:2px solid #fff;border-radius:8px;background:#000}
#inesCropWrap img{position:absolute;width:300%;height:200%;top:0;left:0}

#stats{position:fixed;bottom:5vmin;right:5vmin;font-size:clamp(14px,3.2vmin,18px);z-index:30;display:none;text-align:right;line-height:1.6;background:rgba(0,0,0,.7);padding:1.5vmin 2vmin;border-radius:8px;border:1px solid rgba(255,255,255,.15)}
</style>
</head>
<body>

<button id="start" onclick="run()">Touchez pour entrer</button>
<button id="restart" onclick="location.reload()">Recommencer</button>
<div id="text"></div>
<div id="countdown"></div>

<div id="sceneWrap">
  <img id="sceneImg" src="touslessuspects.jpg" alt="La réunion">
  <!-- Zones cliquables calibrées sur l'image -->
  <div class="zone" data-who="Colin"  style="left:4%;  top:24%; width:18%; height:35%"></div>
  <div class="zone" data-who="Rémy"   style="left:14%; top:38%; width:16%; height:28%"></div>
  <div class="zone" data-who="Vidal"  style="left:30%; top:10%; width:16%; height:24%"></div>
  <div class="zone" data-who="Arnaud" style="left:40%; top:24%; width:16%; height:22%"></div>
  <div class="zone" data-who="Inès"   style="left:54%; top:16%; width:14%; height:32%"></div>
  <div class="zone" data-who="Noé"    style="left:77%; top:23%; width:14%; height:30%"></div>
  <div class="zone" data-who="Sam"    style="left:35%; top:46%; width:16%; height:24%"></div>
  <div class="zone" data-who="Chloé"  style="left:61%; top:38%; width:18%; height:34%"></div>
  <div id="imageHint">Touchez un personnage</div>
</div>

<div id="tooltip">
  <strong id="tooltipName"></strong>
  <span id="tooltipDesc"></span>
  <br>
  <button id="tooltipClose">Fermer</button>
</div>

<div id="choices"></div>
<div id="inesCropWrap"><img id="inesCropImg" src="ines_5_choix.jpg" alt=""></div>
<div id="stats"></div>

<audio id="narrateur" src="narrateur.mp3" preload="auto" playsinline></audio>
<audio id="porte"     src="porte.mp3"     preload="auto" playsinline></audio>

<script>
const $=id=>document.getElementById(id);
const start=$('start'), restart=$('restart'), text=$('text'), countdown=$('countdown');
const sceneWrap=$('sceneWrap'), sceneImg=$('sceneImg');
const tooltip=$('tooltip'), tooltipName=$('tooltipName'), tooltipDesc=$('tooltipDesc');
const tooltipClose=$('tooltipClose'), imageHint=$('imageHint');
const choices=$('choices'), stats=$('stats');
const cropWrap=$('inesCropWrap'), cropImg=$('inesCropImg');
const narrateur=$('narrateur'), porte=$('porte');

const descriptions={
  'Colin' :"Mains dans les poches. Il regarde personne en particulier.",
  'Rémy'  :"Bras bandé de l'épaule aux doigts. Il aurait préféré rester à l'hôpital.",
  'Vidal' :"Bras croisés. La montre neuve. Il attend que ça finisse.",
  'Arnaud':"Droite, comme toujours. Quelqu'un qui a décidé très tôt que la gravité, c'est une question de posture.",
  'Inès'  :"Debout. Elle a demandé à être debout.",
  'Noé'   :"Regard sur ses chaussures. La posture des mauvais jours.",
  'Sam'   :"Assis au centre. Il regarde Inès.",
  'Chloé' :"Elle arrive en dernier. Une démarche particulière lorsqu'elle est stressée."
};

function show(el){el.style.display='block'}
function hide(el){el.style.display='none'}
function flex(el){el.style.display='flex'}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

function showText(t,pos='center'){
  text.className='';
  text.classList.add(pos);
  text.textContent=t;
  show(text);
}
function hideText(){hide(text)}

async function play(a){try{await a.play()}catch{}}

function normalize(s){return(s||'').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim()}

function addUsed(id){
  const set=new Set(JSON.parse(localStorage.getItem('qr_used_set')||'[]'));
  set.add(id);
  localStorage.setItem('qr_used_set',JSON.stringify([...set]));
  return set.size;
}

// Compte à rebours
async function runCountdown(from){
  countdown.style.opacity='1';
  for(let i=from;i>=1;i--){
    countdown.textContent=i;
    await sleep(900);
  }
  countdown.style.opacity='0';
  countdown.textContent='';
  await sleep(300);
}

// Zones cliquables — setup
let zonesUnlocked=false;
let touchedCount=0;

function setupZones(){
  document.querySelectorAll('.zone').forEach(z=>{
    z.addEventListener('click',()=>{
      if(!zonesUnlocked)return;
      const who=z.dataset.who;
      document.querySelectorAll('.zone').forEach(z2=>z2.classList.remove('active'));
      z.classList.add('active');
      tooltipName.textContent=who;
      tooltipDesc.textContent=descriptions[who]||'';
      show(tooltip);
      touchedCount++;
      if(touchedCount===1){
        // cache l'invite après le premier tap
        imageHint.style.opacity='0';
      }
    });
  });
  tooltipClose.addEventListener('click',()=>{
    hide(tooltip);
    document.querySelectorAll('.zone').forEach(z=>z.classList.remove('active'));
  });
}

// Zoom Inès si QR4 scanné
async function showInesZoom(){
  const choice=parseInt(localStorage.getItem('qr4_ines_choice')||'0',10);
  if(choice>=1&&choice<=5){
    const col=(choice-1)%3, row=Math.floor((choice-1)/3);
    cropImg.style.left=`-${col*100}%`;
    cropImg.style.top=`-${row*100}%`;
    show(cropWrap);
    showText("C'était ton Inès.",'bottom');
    await sleep(4500);
    hideText();
    hide(cropWrap);
  }
}

async function run(){
  hide(start);
  const used=addUsed('qr12');

  // — PHASE 1 : mémoire du dispositif (ponts inter-QR) —
  const ponts=[];
  const qr9vestiaire=localStorage.getItem('qr9_vestiaire');
  if(qr9vestiaire) ponts.push(`Au vestiaire, tu comptais aussi.\nSam a arrêté de compter aujourd'hui.`);

  const firstCarnet=(localStorage.getItem('qr11_carnet_first')||'').toUpperCase();
  if(firstCarnet==='LAVELOT') ponts.push(`Dans le carnet de Vidal, tu avais lu Lavelot en premier.\nIl est dans cette pièce.`);
  else if(firstCarnet==='MOREL') ponts.push(`Dans le carnet de Vidal, tu avais lu Morel en premier.\nIl est dans cette pièce.`);
  else if(firstCarnet==='DUBOIS') ponts.push(`Dans le carnet de Vidal, tu avais lu Dubois en premier.\nElle est dans cette pièce.`);

  if(ponts.length>0){
    for(const p of ponts){
      showText(p,'center');
      await sleep(4500);
      hideText();
      await sleep(400);
    }
  }

  // — PHASE 2 : tension montante —
  showText('Mercredi. 8h31.\nBureau de Mme Arnaud.','center');
  await sleep(3000);
  hideText();
  await sleep(500);

  showText('Ils sont sept.\nUne pièce prévue pour trois.','center');
  await sleep(3000);
  hideText();
  await sleep(500);

  // Son de porte + compte à rebours
  await play(porte);
  await sleep(600);
  await runCountdown(5);

  // — PHASE 3 : révélation progressive —
  // L'image arrive, personnages apparaissent avec le narrateur
  show(sceneWrap);
  sceneImg.style.opacity='0';
  sceneImg.style.transition='opacity 1.2s';
  await sleep(50);
  sceneImg.style.opacity='1';
  await sleep(1200);

  // Narrateur parle pendant que l'image est visible
  await play(narrateur);
  await sleep(7000);
  try{narrateur.pause();narrateur.currentTime=0}catch{}

  // Déverrouiller les zones
  zonesUnlocked=true;
  imageHint.style.opacity='1';

  // Attendre que le lecteur ait tapé au moins un personnage (max 30 sec)
  await new Promise(res=>{
    let waited=0;
    const check=setInterval(()=>{
      waited+=500;
      if(touchedCount>=1||waited>=30000){clearInterval(check);res();}
    },500);
  });

  // Zoom Inès si choisi dans QR4
  const lastTouched=document.querySelector('.zone.active');
  if(lastTouched&&lastTouched.dataset.who==='Inès') await showInesZoom();

  // Vidal jeune si QR11 scanné et reconnu
  if(lastTouched&&lastTouched.dataset.who==='Vidal'){
    const vidalMatch=localStorage.getItem('qr11_vidal_match')||'';
    if(normalize(vidalMatch).includes('oui')){
      hide(sceneWrap);
      hide(tooltip);
      await sleep(300);
      showText('Tu l\'avais reconnu.','center');
      await sleep(3000);
      hideText();
    }
  }

  // — PHASE 4 : instruction de lecture —
  hide(sceneWrap);
  hide(tooltip);
  await sleep(400);

  showText('Dans quelques secondes tu vas lire.\nChaque personnage dans cette pièce a une raison d\'être là.\nToi aussi tu sais des choses sur eux.\nUtilise-les.','center');
  await sleep(10000);
  hideText();

  // Stats
  const total=12;
  stats.innerHTML=`Scans proposés : ${total}<br>Scans utilisés : ${used}`;
  show(stats);
  show(restart);
}

setupZones();
</script>
</body>
</html>
