<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>QR12</title>
    <style>
        html, body, div, span, img, video, button { 
            all: unset; 
            display: revert; 
            box-sizing: border-box;
        }
        body > div:not(#start):not(#restart) { display: none !important; }
        
        html, body {
            background: #000 !important;
            color: #fff;
            font-family:system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
        }
        .btn {
            font-size: 4vmin;
            padding: 3vmin 6vmin;
            background: #fff;
            border: none;
            border-radius: 8px;
            color: #000;
            font-family:system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            cursor: pointer;
            position: relative;
            z-index: 9999;
            -webkit-tap-highlight-color: transparent;
        }
        #start { animation: blink 1.5s infinite; }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        #media {
            position: fixed;
            width: 100vmin;
            height: 100vmin;
            object-fit: contain;
            opacity: 0;
            transition: opacity 1.2s;
            z-index: 9997;
            background: #000;
        }
        #restart {
            position: fixed;
            bottom: 10vmin;
            opacity: 0;
            transition: opacity 1s;
        }
        .visible { opacity: 1 !important; }
        .hidden { display: none !important; }
    </style>
<style>
/* === UNIFICATION TYPO === */
html,body,button,input,select,textarea {
  font-family:system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
}
p, #text, .screen p, #question, #msg {
  font-size:clamp(20px,4.5vmin,28px) !important;
  line-height:1.45 !important;
}
button, .btn, .choiceBtn, .choice, .carnetBtn {
  font-size:clamp(18px,4vmin,24px) !important;
  font-family:system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
}
#startBtn, #start, #btn, #restartBtn, #restart {
  font-size:clamp(20px,5vmin,26px) !important;
}
small, .sub, #recall, #hint, #carnetLine {
  font-size:clamp(16px,3.2vmin,20px) !important;
}
</style>
</head>
<body>
    <button id="start" class="btn">Touchez pour entrer</button>
    <img id="media" src="" style="display:none;">
    <button id="restart" class="btn">Recommencer</button>
    <div id="stats" style="position:fixed;bottom:22vmin;left:50%;transform:translateX(-50%);text-align:center;font-size:clamp(18px,4vmin,24px);line-height:1.5;opacity:0;transition:opacity 1s;z-index:9998;max-width:90vw;"></div>

    <audio id="audioNarrateur" src="narrateur.mp3" preload="auto" playsinline webkit-playsinline></audio>

    <script>
        const start = document.getElementById('start');
        const media = document.getElementById('media');
        const restart = document.getElementById('restart');
        const audioNarrateur = document.getElementById('audioNarrateur');
        const stats = document.getElementById('stats');

        const sleep = ms => new Promise(r => setTimeout(r, ms));
        
        const showImage = (src) => {
            return new Promise((resolve) => {
                media.onload = () => {
                    media.style.display = 'block';
                    media.classList.add('visible');
                    resolve();
                };
                media.onerror = () => {
                    console.error('Image introuvable:', src);
                    resolve();
                };
                media.src = src;
            });
        };

        const hideImage = async () => {
            media.classList.remove('visible');
            await sleep(1200);
            media.src = '';
        };

        async function sequence() {
            start.classList.add('hidden');
            
            try {
                await showImage('touslessuspects.png');
                audioNarrateur.play().catch(()=>{});
                await new Promise(r => { audioNarrateur.onended = r; setTimeout(r,8000); });
                await hideImage();
                const total = parseInt(localStorage.getItem('scans_total')||'0');
                const used = parseInt(localStorage.getItem('scans_used')||'0');
                const solo = Math.max(0, total - used);
                stats.innerHTML = `QR proposés : ${total}<br>QR ouverts : ${used}<br>Vous avez choisi d'imaginer seul ${solo} fois.`;
                stats.style.opacity = '1';
                restart.classList.add('visible');
            } catch(e) {
                console.error('Erreur:', e);
                restart.classList.add('visible');
            }
        }

        start.onclick = () => sequence();
        restart.onclick = () => location.reload();
    </script>
</body>
</html>
