<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QR2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;width:100%;height:100vh;overflow:hidden;font-family:system-ui}
.screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.screen.active{display:flex}
button{background:#fff;color:#000;border:none;padding:15px 30px;font-size:18px;border-radius:8px;cursor:pointer;z-index:10}
#startBtn{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:100}
</style>
</head>
<body>
<button id="startBtn">Touchez pour commencer</button>
<div id="s1" class="screen"></div>
<audio id="a1" src="audio/qrcode2total.mp3"></audio>
<script>
const s1=document.getElementById('s1');
const a1=document.getElementById('a1');
const startBtn=document.getElementById('startBtn');

startBtn.onclick=()=>{
  startBtn.remove();
  s1.classList.add('active');
  a1.play().catch(e=>console.log('Audio error:',e));
  a1.onended=()=>{
    let b=document.createElement('button');
    b.textContent='Recommencer';
    b.onclick=()=>{location.reload()};
    s1.appendChild(b);
  }
}
</script>
</body>
</html>
