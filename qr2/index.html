<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QR2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;width:100%;height:100vh;overflow:hidden;font-family:system-ui}
.screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}
.screen.active{display:flex}
#btn{background:#fff;color:#000;border:none;padding:20px 40px;font-size:20px;border-radius:8px;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);cursor:pointer;z-index:100}
#restart{background:#fff;color:#000;border:none;padding:15px 30px;font-size:18px;border-radius:8px;cursor:pointer;margin-top:30px}
p{font-size:22px;line-height:1.4;max-width:600px}
</style>
</head>
<body>
<button id="btn">Touchez pour commencer</button>

<div id="meta" class="screen">
  <p>Fermez les yeux 5 secondes. Imaginez la voix de Sam dans le couloir.</p>
</div>

<div id="post" class="screen">
  <p>Comparez avec ce que vous aviez imaginé.</p>
  <button id="restart">Recommencer</button>
</div>

<audio id="audio" src="./qrcode2total.mp3" preload="auto"></audio>

<script>
const btn=document.getElementById('btn');
const restart=document.getElementById('restart');
const audio=document.getElementById('audio');
const meta=document.getElementById('meta');
const post=document.getElementById('post');

// Comptage
let t=parseInt(localStorage.getItem('scans_total')||0)+1;
localStorage.setItem('scans_total',t);

btn.onclick=()=>{
  let u=parseInt(localStorage.getItem('scans_used')||0)+1;
  localStorage.setItem('scans_used',u);
  
  btn.style.display='none';
  meta.classList.add('active');
  
  setTimeout(()=>{
    meta.classList.remove('active');
    audio.volume=1;
    audio.play().catch(()=>alert('Activez le son'));
  },5000);
}

audio.onended=()=>{
  post.classList.add('active');
}

restart.onclick=()=>location.reload();
</script>
</body>
</html>
