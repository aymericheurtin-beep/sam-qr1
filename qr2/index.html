<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QR2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;width:100%;height:100vh;overflow:hidden;font-family:system-ui}
button{background:#fff;color:#000;border:none;padding:15px 30px;font-size:18px;border-radius:8px;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%)}
</style>
</head>
<body>
<button id="btn">Touchez pour commencer</button>
<audio id="a1" src="./qrcode2total.mp3"></audio>
<script>
btn.onclick=()=>{
  btn.remove();
  document.getElementById('a1').play().then(()=>{
    document.body.innerHTML='<div style="display:flex;height:100vh;align-items:center;justify-content:center"><button onclick=location.reload()>Recommencer</button></div>';
  }).catch(e=>{
    document.body.innerHTML='ERREUR: '+e.message;
  });
}
</script>
</body>
</html>
