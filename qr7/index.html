<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR7 - VIDAL</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { 
    width: 100%; height: 100%; 
    background: #000; 
    overflow: hidden; 
    font-family: 'Courier New', monospace;
    color: #fff;
  }
  #stage {
    position: relative;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: #000;
  }
  .btn {
    background: #fff;
    color: #000;
    border: none;
    padding: 12px 24px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    z-index: 10;
    font-family: Arial, sans-serif;
  }
  #restartBtn {
    position: absolute;
    bottom: 8vmin;
    display: none;
    opacity: 0;
    transition: opacity 1.5s;
  }
  #texte {
    position: absolute;
    text-align: center;
    font-size: 4.5vmin;
    line-height: 1.8;
    max-width: 85vw;
    opacity: 0;
    transition: opacity 1.2s;
  }
  .flash { animation: flashWhite 0.05s; }
  @keyframes flashWhite { 0%,100%{background:#000} 50%{background:#fff} }
</style>
</head>
<body>
<div id="stage">
  <button id="startBtn" class="btn">Touchez pour commencer</button>
  
  <div id="texte"></div>
  
  <button id="restartBtn" class="btn">Recommencer</button>
</div>

<audio id="noe" src="noé.mp3" preload="auto"></audio>
<audio id="pas" src="pas.mp3" preload="auto"></audio>
<audio id="bar" src="bar.mp3" preload="auto"></audio>
<audio id="gifle" src="gifle.mp3" preload="auto"></audio>
<audio id="respi" src="respiration.mp3" preload="auto"></audio>

<script>
const startBtn = document.getElementById('startBtn');
const restartBtn = document.getElementById('restartBtn');
const texte = document.getElementById('texte');

const noe = document.getElementById('noe');
const pas = document.getElementById('pas');
const bar = document.getElementById('bar');
const gifle = document.getElementById('gifle');
const respi = document.getElementById('respi');

let started = false;

startBtn.addEventListener('click', startExperience);
restartBtn.addEventListener('click', () => location.reload());

async function startExperience() {
  if (started) return;
  started = true;
  startBtn.style.display = 'none';
  runSequence();
}

async function playSafe(audio) {
  try { 
    audio.currentTime = 0;
    await audio.play(); 
  } catch(e) { 
    console.log('Audio error:', audio.src, e); 
  }
}

async function showText(txt, fadeIn = 1200, hold = 2000, fadeOut = 1200) {
  texte.innerHTML = txt;
  texte.style.transition = `opacity ${fadeIn}ms`;
  texte.style.opacity = '1';
  await sleep(hold);
  texte.style.transition = `opacity ${fadeOut}ms`;
  texte.style.opacity = '0';
  await sleep(fadeOut);
}

async function showTextStay(txt, fadeIn = 1500) {
  texte.innerHTML = txt;
  texte.style.transition = `opacity ${fadeIn}ms`;
  texte.style.opacity = '1';
}

async function runSequence() {
  // 1. Texte intro
  await showText('La voix traverse la piste.', 1200, 1500, 1000);
  await showText('Forte. Trop forte.', 1200, 1500, 1000);
  
  // 2. Audio "Noé"
  await playSafe(noe);
  await sleep(1800);
  
  // 3. Bruit de pas
  await playSafe(pas);
  await sleep(2800);
  
  // 4. Audio "La Nationale..."
  await playSafe(bar);
  await sleep(2200);
  
  // 5. GIFLE + Flash
  document.body.classList.add('flash');
  await playSafe(gifle);
  await sleep(50);
  document.body.classList.remove('flash');
  
  // 6. SILENCE 2s après la gifle
  await sleep(2000);
  
  // 7. 10s de respiration + texte final qui apparaît pendant
  playSafe(respi);
  await sleep(1500); // Laisse 1.5s de respi seule
  await showTextStay("C'est ça qui est insupportable.<br>Pas la gifle.<br>Le fait que Noé ne soit pas surpris.", 2000);
  await sleep(8500); // Le reste des 10s
  
  // 8. Bouton recommencer
  restartBtn.style.display = 'block';
  setTimeout(() => restartBtn.style.opacity = '1', 50);
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}
</script>
</body>
</html>
