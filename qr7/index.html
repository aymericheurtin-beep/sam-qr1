<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QR7 - VIDAL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Courier New',monospace;color:#fff}
#stage{position:relative;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:#000}
.btn{background:#fff;color:#000;border:none;padding:12px 24px;font-size:16px;border-radius:8px;cursor:pointer;z-index:10;font-family:Arial,sans-serif}
#startBtn{position:absolute}
#restartBtn{position:absolute;bottom:8vmin;display:none;opacity:0;transition:opacity 1.5s}
#texte{position:absolute;text-align:center;font-size:4.5vmin;line-height:1.8;max-width:85vw;opacity:0;transition:opacity 1.2s}
.flash{animation:flashWhite.05s}
@keyframes flashWhite{0%,100%{background:#000}50%{background:#fff}}
.screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;background:#000;z-index:30}
.screen.active{display:flex}
.screen p{font-size:22px;line-height:1.4;max-width:650px;margin-bottom:20px;font-family:Arial,sans-serif}
.choice{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
#recall{font-size:18px;color:#aaa;margin-top:20px;font-family:Arial,sans-serif}
</style>
</head>
<body>
<div id="stage">
  <button id="startBtn" class="btn">Touchez pour commencer</button>
  <div id="texte"></div>
  <button id="restartBtn" class="btn">Recommencer</button>
</div>

<div id="pre" class="screen">
  <p>La gifle, vous l’imaginez comment?</p>
  <div class="choice">
    <button class="btn choiceBtn" data-val="violente">Violente</button>
    <button class="btn choiceBtn" data-val="contrôlée">Contrôlée</button>
    <button class="btn choiceBtn" data-val="autre">Autre</button>
  </div>
</div>

<audio id="noe" src="noé.mp3" preload="auto"></audio>
<audio id="pas" src="pas.mp3" preload="auto"></audio>
<audio id="bar" src="bar.mp3" preload="auto"></audio>
<audio id="gifle" src="gifle.mp3" preload="auto"></audio>
<audio id="respi" src="respiration.mp3" preload="auto"></audio>

<script>
const startBtn=document.getElementById('startBtn');
const restartBtn=document.getElementById('restartBtn');
const texte=document.getElementById('texte');
const pre=document.getElementById('pre');
const noe=document.getElementById('noe');
const pas=document.getElementById('pas');
const bar=document.getElementById('bar');
const gifle=document.getElementById('gifle');
const respi=document.getElementById('respi');

let started=false;
let choix='';

let t=parseInt(localStorage.getItem('scans_total')||0)+1;
localStorage.setItem('scans_total',t);

startBtn.onclick=()=>{
  let u=parseInt(localStorage.getItem('scans_used')||0)+1;
  localStorage.setItem('scans_used',u);
  startBtn.style.display='none';
  pre.classList.add('active');
};

document.querySelectorAll('.choiceBtn').forEach(b=>{
  b.onclick=()=>{
    choix=b.dataset.val;
    pre.classList.remove('active');
    startExperience();
  };
});

restartBtn.onclick=()=>location.reload();

async function startExperience(){
  if(started) return;
  started=true;
  runSequence();
}

async function playSafe(a){try{a.currentTime=0;await a.play()}catch(e){}}
async function showText(txt,fadeIn=1200,hold=1500,fadeOut=1000){
  texte.innerHTML=txt;
  texte.style.transition=`opacity ${fadeIn}ms`;
  texte.style.opacity='1';
  await sleep(hold);
  texte.style.transition=`opacity ${fadeOut}ms`;
  texte.style.opacity='0';
  await sleep(fadeOut);
}
async function showTextStay(txt,fadeIn=2000){
  texte.innerHTML=txt;
  texte.style.transition=`opacity ${fadeIn}ms`;
  texte.style.opacity='1';
}

async function runSequence(){
  await showText('La voix traverse la piste.',1200,1500,1000);
  await showText('Forte. Trop forte.',1200,1500,1000);
  await playSafe(noe);await sleep(1800);
  await playSafe(pas);await sleep(2800);
  await playSafe(bar);await sleep(2200);
  document.body.classList.add('flash');
  await playSafe(gifle);await sleep(50);
  document.body.classList.remove('flash');
  await sleep(2000);
  playSafe(respi);await sleep(1500);
  await showTextStay(`C'est ça qui est insupportable.<br>Pas la gifle.<br>Le fait que Noé ne soit pas surpris.<br><span id="recall">Vous aviez dit ${choix}. Et maintenant?</span>`,2000);
  await sleep(8500);
  restartBtn.style.display='block';
  setTimeout(()=>restartBtn.style.opacity='1',50);
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
</script>
</body>
</html>
