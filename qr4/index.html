<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QR4 - Inès</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;width:100%;height:100vh;overflow:hidden;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}
#btn,#restart{background:#fff;color:#000;border:none;padding:20px 40px;font-size:clamp(20px,5vmin,26px);border-radius:8px;position:fixed;left:50%;transform:translateX(-50%);cursor:pointer;z-index:10}
#btn{top:50%;transform:translate(-50%,-50%)}
#restart{bottom:30px;display:none}
#qcm{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);max-width:100vw;max-height:100vh;display:none}
.zone{position:fixed;cursor:pointer;border:3px solid transparent;display:none;transition:.2s}
.zone:hover{border-color:#fff;background:rgba(255,255,255,.15)}
#messageFin{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(20px,4.5vmin,28px);text-align:center;display:none;z-index:10;padding:20px;max-width:80%;line-height:1.4}
</style>
</head>
<body>
<button id="btn">Touchez pour commencer</button>
<button id="restart">Recommencer</button>
<img id="qcm" src="./ines_5_choix.jpg" alt="Choisissez votre Inès">
<div id="messageFin">Bien vu. C'est TON Inès, garde la bien en mémoire</div>

<div class="zone" id="z1"></div>
<div class="zone" id="z2"></div>
<div class="zone" id="z3"></div>
<div class="zone" id="z4"></div>
<div class="zone" id="z5"></div>
<div class="zone" id="z6"></div>

<audio id="intro" src="./ines_question.mp3" preload="auto"></audio>
<audio id="consigne" src="./ines_consigne.mp3" preload="auto"></audio>

<script>
const btn=document.getElementById('btn');
const restart=document.getElementById('restart');
const qcm=document.getElementById('qcm');
const intro=document.getElementById('intro');
const consigne=document.getElementById('consigne');
const zones=document.querySelectorAll('.zone');
const messageFin=document.getElementById('messageFin');

function addUsed(id){
  const set=new Set(JSON.parse(localStorage.getItem('qr_used_set')||'[]'));
  set.add(id);
  localStorage.setItem('qr_used_set',JSON.stringify([...set]));
}

btn.onclick=()=>{
  addUsed('qr4');
  btn.style.display='none';
  intro.play().catch(()=>alert('Activez le son'));
};

intro.onended=()=>{
  qcm.style.display='block';
  const start=()=>{placerZones();consigne.play();};
  qcm.complete?start():qcm.onload=start;
};

function placerZones(){
  const r=qcm.getBoundingClientRect();
  const w=r.width,h=r.height,l=r.left,t=r.top;
  const pos=[[0,0,w/3,h/2],[w/3,0,w/3,h/2],[w*2/3,0,w/3,h/2],[0,h/2,w/3,h/2],[w/3,h/2,w/3,h/2],[w*2/3,h/2,w/3,h/2]];
  zones.forEach((z,i)=>{
    z.style.left=l+pos[i][0]+'px';
    z.style.top=t+pos[i][1]+'px';
    z.style.width=pos[i][2]+'px';
    z.style.height=pos[i][3]+'px';
    z.style.display='block';
    z.onclick=()=>validerChoix(i+1);
  });
}

function validerChoix(idx){
  consigne.pause();
  qcm.style.display='none';
  zones.forEach(z=>z.style.display='none');
  // On stocke le choix 1..6
  localStorage.setItem('qr4_ines_choice',String(idx));
  // Fallback : on garde aussi la planche complète
  localStorage.setItem('qr4_ines','ines_5_choix.jpg');
  messageFin.style.display='block';
  restart.style.display='block';
}

restart.onclick=()=>location.reload();
window.onresize=()=>{if(qcm.style.display==='block')placerZones();};
</script>
</body>
</html>
