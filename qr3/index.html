<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QR3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;width:100%;height:100vh;overflow:hidden;font-family:system-ui}
#btn{background:#fff;color:#000;border:none;padding:20px 40px;font-size:20px;border-radius:8px;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);cursor:pointer;z-index:100}
#restart{background:#fff;color:#000;border:none;padding:15px 30px;font-size:18px;border-radius:8px;cursor:pointer;position:fixed;bottom:40px;left:50%;transform:translateX(-50%);z-index:100;display:none}
#video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;background:#000;display:none}
</style>
</head>
<body>
<button id="btn">Touchez pour commencer</button>
<video id="video" src="./docfinalqr3.mp4" playsinline preload="auto"></video>
<button id="restart">Recommencer</button>
<script>
const btn=document.getElementById('btn');
const restart=document.getElementById('restart');
const video=document.getElementById('video');
btn.onclick=async()=>{
  btn.style.display='none';
  video.style.display='block';
  try{await video.play();}catch(e){btn.style.display='block';video.style.display='none';}
};
video.onended=()=>{
  video.style.display='none';
  restart.style.display='block';
};
restart.onclick=()=>location.reload();
</script>
</body>
</html>
