<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QR5</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:Arial,sans-serif;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.btn{background:#fff;color:#000;border:none;padding:14px 28px;font-size:18px;border-radius:8px;cursor:pointer}
#start{position:absolute;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.6}}
#image{position:absolute;max-width:100vmin;max-height:100vmin;object-fit:contain;opacity:0;transition:opacity 1s}
#image.visible{opacity:1}
#text{position:absolute;bottom:10vmin;font-size:4vmin;text-align:center;padding:0 5vmin;opacity:0;transition:opacity 1s}
#text.visible{opacity:1}
.hidden{display:none}
</style>
</head>
<body>
<button id="start" class="btn">Touchez pour commencer</button>
<img id="image" src="">
<div id="text"></div>

<script>
const start=document.getElementById('start');
const image=document.getElementById('image');
const text=document.getElementById('text');

let t=parseInt(localStorage.getItem('scans_total')||0)+1;
localStorage.setItem('scans_total',t);

// préchargement
['photo5.webp'].forEach(s=>{const i=new Image();i.src=s});

start.onclick=()=>{
  let u=parseInt(localStorage.getItem('scans_used')||0)+1;
  localStorage.setItem('scans_used',u);
  start.classList.add('hidden');
  run();
};

async function run(){
  image.src='photo5.webp';
  image.classList.add('visible');
  await sleep(4000);
  text.textContent='Cinquième fragment.';
  text.classList.add('visible');
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
</script>
</body></html>
