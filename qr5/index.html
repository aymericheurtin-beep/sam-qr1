<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QR5 - Chapitre 3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;width:100%;height:100vh;overflow:hidden;font-family:system-ui}
.screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;z-index:20}
.screen.active{display:flex}
#btn{background:#fff;color:#000;border:none;padding:20px 40px;font-size:20px;border-radius:8px;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);cursor:pointer;z-index:10}
#restart{background:#fff;color:#000;border:none;padding:15px 30px;font-size:18px;border-radius:8px;cursor:pointer;margin-top:30px}
#photo{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;display:none;opacity:0;transition:opacity 1.5s ease}
#texte{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:20px;line-height:1.6;background:rgba(0,0,0,0.7);padding:30px 25px;border-radius:12px;text-align:center;display:none;z-index:5;max-width:80vw;opacity:0;transition:opacity 1.5s ease}
#texte p{margin:14px 0}
#texte .dialogue{font-style:italic;color:#ddd}
#texte .citation{font-weight:bold;font-size:26px;margin:20px 0;color:#fff}
#continuer{background:#fff;color:#000;border:none;padding:12px 24px;font-size:16px;border-radius:8px;cursor:pointer;margin-top:20px}
p.question{font-size:22px;line-height:1.4;max-width:650px}
</style>
</head>
<body>
<button id="btn">Touchez pour commencer</button>

<img id="photo" src="./course.png" alt="Noé et Sam">

<div id="texte">
  <p class="dialogue">— Ce qui me fait peur, c'est si un jour j'en reviens plus vraiment.</p>
  <p class="citation">Il dit juste : "Je serais là."</p>
  <p>Ce n'est pas grand-chose. C'est tout.</p>
  <button id="continuer">Continuer</button>
</div>

<div id="post" class="screen">
  <p class="question">Qu’est-ce que la phrase “Je serais là” change pour Sam, et pour vous ?</p>
  <button id="restart">Recommencer</button>
</div>

<audio id="bruit" src="./course_bruit.mp3" preload="auto"></audio>
<audio id="voix" src="./noe_je_serais_la.mp3" preload="auto"></audio>

<script>
const btn=document.getElementById('btn');
const restart=document.getElementById('restart');
const continuer=document.getElementById('continuer');
const photo=document.getElementById('photo');
const texte=document.getElementById('texte');
const post=document.getElementById('post');
const bruit=document.getElementById('bruit');
const voix=document.getElementById('voix');

let t=parseInt(localStorage.getItem('scans_total')||0)+1;
localStorage.setItem('scans_total',t);

btn.onclick=()=>{
  let u=parseInt(localStorage.getItem('scans_used')||0)+1;
  localStorage.setItem('scans_used',u);
  btn.style.display='none';
  bruit.play().catch(()=>alert('Activez le son'));
}

bruit.onended=()=>{
  photo.style.display='block';
  setTimeout(()=>photo.style.opacity='1',100);
  setTimeout(()=>voix.play(),7000);
}

voix.onended=()=>{
  texte.style.display='block';
  setTimeout(()=>texte.style.opacity='1',500);
}

continuer.onclick=()=>{
  texte.style.display='none';
  photo.style.display='none';
  post.classList.add('active');
}

restart.onclick=()=>location.reload();
</script>
</body>
</html>
