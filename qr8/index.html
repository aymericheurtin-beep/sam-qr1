<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR8 - Sam</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .btn {
            font-size: 4vmin;
            padding: 3vmin 6vmin;
            background: #fff;
            border: none;
            border-radius: 8px;
            color: #000;
            font-family: Arial, sans-serif;
            cursor: pointer;
            position: relative;
            z-index: 9999;
        }
        #start {
            animation: blink 1.5s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        #text {
            position: absolute;
            font-size: 6vmin;
            text-align: center;
            padding: 5vmin;
            line-height: 1.4;
            opacity: 0;
            transition: opacity 0.5s;
            white-space: pre-line;
            font-family: 'Courier New', monospace;
            z-index: 9998;
        }
        #image {
            position: absolute;
            width: 100vmin;
            height: 100vmin;
            object-fit: contain;
            opacity: 0;
            z-index: 9997;
        }
        #restart {
            position: absolute;
            bottom: 10vmin;
            opacity: 0;
            transition: opacity 1s;
        }
        .visible { opacity: 1 !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <button id="start" class="btn">Touchez pour commencer</button>
    <div id="text"></div>
    <img id="image" src="">
    <button id="restart" class="btn">Recommencer</button>

    <audio id="annonce" src="message_arnaud.mp3" preload="auto"></audio>
    <audio id="brouhaha" src="brouhaha2.mp3" preload="auto"></audio>

    <script>
        const start = document.getElementById('start');
        const text = document.getElementById('text');
        const image = document.getElementById('image');
        const restart = document.getElementById('restart');
        const annonce = document.getElementById('annonce');
        const brouhaha = document.getElementById('brouhaha');

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        async function sequence() {
            start.classList.add('hidden');
            
            // 1. Texte intro
            text.textContent = 'vendredi 8h27\ncollège les Peupliers Blancs';
            text.classList.add('visible');
            await sleep(2500);
            
            // 2. Audio annonce Mme Arnaud
            text.classList.remove('visible');
            await sleep(500);
            annonce.play().catch(e => console.log('Erreur annonce:', e));
            await sleep(4200);
            
            // 3. SILENCE LONG
            await sleep(1500);
            text.textContent = 'Silence.';
            text.classList.add('visible');
            await sleep(1500);
            text.classList.remove('visible');
            await sleep(800);
            
            // 4. Brouhaha
            brouhaha.play().catch(e => console.log('Erreur brouhaha:', e));
            await sleep(2000);
            
            // 5. Nouveau texte
            text.textContent = '8h30. Bureau de Mme Arnaud.';
            text.classList.add('visible');
            await sleep(2000);
            text.classList.remove('visible');
            await sleep(500);
            
            // 6. CAMERA 6s - 1 SEULE FOIS
            image.style.transition = 'opacity 1s';
            image.src = 'caméra.jpeg';
            image.classList.add('visible');
            await sleep(6000); // 6 secondes
            
            // 7. FONDU VERS FUMEE 4s - 1 SEULE FOIS
            image.classList.remove('visible');
            await sleep(1000); // temps du fade out
            image.src = 'fumee.png';
            image.classList.add('visible');
            await sleep(4000); // 4 secondes
            
            // 8. FONDU VERS CARNET
            image.classList.remove('visible');
            await sleep(1000);
            image.src = 'carnet.png';
            image.classList.add('visible');
            await sleep(4000);
            
            // 9. Bouton recommencer
            restart.classList.add('visible');
        }

        start.onclick = () => sequence();
        restart.onclick = () => location.reload();
    </script>
</body>
</html>
